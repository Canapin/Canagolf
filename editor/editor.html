<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Canagolf — Map Editor</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #1a1a1a;
        color: #ccc;
        font-family: monospace;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Toolbar ── */
      #toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 12px;
        background: #252525;
        border-bottom: 1px solid #383838;
        flex-shrink: 0;
      }
      #toolbar label {
        display: flex;
        align-items: center;
        gap: 4px;
        color: #aaa;
      }
      #toolbar input[type="number"] {
        width: 48px;
        background: #333;
        color: #ddd;
        border: 1px solid #555;
        padding: 3px 5px;
        font-family: monospace;
      }
      #toolbar input[type="text"] {
        width: 110px;
        background: #333;
        color: #ddd;
        border: 1px solid #555;
        padding: 3px 5px;
        font-family: monospace;
      }
      .sep {
        width: 1px;
        height: 22px;
        background: #444;
        flex-shrink: 0;
      }
      button {
        background: #2e2e2e;
        color: #ccc;
        border: 1px solid #555;
        padding: 4px 10px;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
      }
      button:hover {
        background: #898989;
      }
      button.primary {
        background: #1e5c1e;
        border-color: #3a8a3a;
        color: #dfd;
      }
      button.primary:hover {
        background: #256025;
      }
      button.active-tool {
        background: #1a3060;
        border-color: #4a70cc;
        color: #adf;
      }
      #status {
        color: #7a7;
        font-size: 11px;
      }
      .spacer {
        flex: 1;
      }

      /* ── Main area ── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Palette ── */
      #palette {
        width: 300px;
        background: #1e1e1e;
        border-right: 1px solid #333;
        padding: 6px;
        overflow-y: auto;
        flex-shrink: 0;
      }
      .pg {
        margin-bottom: 8px;
      }
      .pg-title {
        font-size: 10px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding-bottom: 3px;
        margin-bottom: 4px;
        border-bottom: 1px solid #2a2a2a;
      }
      .sg-title {
        font-size: 9px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin: 3px 0 2px;
      }
      .tile-row {
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        margin-bottom: 2px;
      }
      .swatch-btn {
        width: 28px;
        height: 28px;
        cursor: pointer;
        flex-shrink: 0;
        border: 2px solid transparent;
        border-radius: 2px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .swatch-btn:hover {
        border-color: #555;
      }
      .swatch-btn.active {
        border-color: #4a9a4a;
      }

      /* ── Canvas wrap ── */
      #canvas-wrap {
        flex: 1;
        overflow: auto;
        background: #111;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
      }
      #canvas {
        display: block;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <label
        >W <input type="number" id="iw" value="30" min="5" max="100"
      /></label>
      <label
        >H <input type="number" id="ih" value="20" min="5" max="80"
      /></label>
      <button id="btn-resize">Resize</button>
      <div class="sep"></div>
      <button id="btn-load">Load ▲</button>
      <input type="file" id="file-in" accept=".txt,.json" hidden />
      <div class="sep"></div>
      <button id="btn-select">⬚ Select</button>
      <div class="spacer"></div>
      <label>Name <input type="text" id="iname" value="hole1" /></label>
      <button class="primary" id="btn-save">Save ▼</button>
      <span id="status"></span>
    </div>

    <div id="main">
      <div id="palette"></div>
      <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
    </div>

    <script>
      // ── Wall char set (mirrors physics.js WALL_CHARS_SET) ────────────────────────
      const WALL_CHARS_SET = new Set([
        "#",
        "+",
        "~",
        "i",
        "j",
        "k",
        "l",
        "N",
        "P",
        "Q",
        "R",
        "(",
        ")",
        "[",
        "]",
        "1",
        "2",
        "3",
        "4",
        "T",
        "U",
        "V",
        "X",
        "{",
        "}",
        "@",
        "$",
        "5",
        "6",
        "7",
        "8",
        "Y",
        "Z",
        "0",
        "9",
        "%",
        "&",
        "*",
        "_",
        "J",
        "K",
        "L",
        "M",
        "-",
        "!",
        ",",
        ";",
        "\\",
      ]);

      function isWallChar(c) {
        return WALL_CHARS_SET.has(c);
      }

      const _SAND_G = new Set([
        "A",
        "a",
        "b",
        "c",
        "d",
        "m",
        "n",
        "o",
        "p",
        "q",
        "r",
        "s",
        "t",
      ]);
      const _WATER_G = new Set([
        "W",
        "e",
        "f",
        "g",
        "h",
        "u",
        "x",
        "y",
        "z",
        "B",
        "C",
        "D",
        "E",
      ]);
      const _LAVA_G = new Set([
        "w",
        "'",
        ":",
        "`",
        '"',
        "Ā",
        "ā",
        "Ă",
        "ă",
        "Ą",
        "ą",
        "Ć",
        "ć",
      ]);
      function getOpenColor(tile) {
        if (tile === "A") return SND;
        if (tile === "W") return WTR;
        if (tile === "w") return LVA;
        return FW;
      }

      // ── Tile definitions ──────────────────────────────────────────────────────────

      const T = 24; // pixels per tile in editor
      const FW = "#3a7a35"; // fairway
      const WL = "#A0A0A0"; // wall
      const WL_E = "#898989"; // wall edge
      const SND = "#c8a84b"; // sand
      const WTR = "#2a7fd4"; // water
      const BNCY = "#e8940a"; // bouncy face
      const BNCY_E = "#9a5c00"; // bouncy edge
      const STKY = "#3a4e7a"; // sticky face
      const STKY_E = "#1a2a4a"; // sticky edge
      const LVA = "#b02000"; // lava

      function fill(color) {
        return (ctx, x, y) => {
          ctx.fillStyle = color;
          ctx.fillRect(x, y, T, T);
        };
      }

      function drawWall(ctx, x, y) {
        ctx.fillStyle = WL;
        ctx.fillRect(x, y, T, T);
        ctx.strokeStyle = "#898989";
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, T - 1, T - 1);
      }

      function drawHole(ctx, x, y) {
        ctx.fillStyle = FW;
        ctx.fillRect(x, y, T, T);
        ctx.fillStyle = "#0a0a0a";
        ctx.beginPath();
        ctx.arc(x + T / 2, y + T / 2, (T * 3) / 8, 0, Math.PI * 2);
        ctx.fill();
      }

      function circleWall() {
        return (ctx, x, y) => {
          ctx.fillStyle = WL;
          ctx.beginPath();
          ctx.arc(x + T / 2, y + T / 2, T / 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = WL_E;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(x + T / 2, y + T / 2, T / 2, 0, Math.PI * 2);
          ctx.stroke();
        };
      }

      function drawStart(ctx, x, y) {
        ctx.fillStyle = FW;
        ctx.fillRect(x, y, T, T);
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${T * 0.55}px monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("S", x + T / 2, y + T / 2);
      }

      function diag(tri, color) {
        return (ctx, x, y) => {
          ctx.fillStyle = FW;
          ctx.fillRect(x, y, T, T);
          ctx.fillStyle = color;
          ctx.beginPath();
          if (tri === "UR") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x + T, y + T);
          }
          if (tri === "LL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          }
          if (tri === "UL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x, y + T);
          }
          if (tri === "LR") {
            ctx.moveTo(x + T, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          }
          ctx.closePath();
          ctx.fill();
        };
      }

      function matCurve(corner, color) {
        return (ctx, x, y) => {
          ctx.fillStyle = FW;
          ctx.fillRect(x, y, T, T);
          let ax, ay, a0, a1;
          if (corner === "TL") {
            ax = x + T;
            ay = y + T;
            a0 = Math.PI;
            a1 = Math.PI * 1.5;
          }
          if (corner === "TR") {
            ax = x;
            ay = y + T;
            a0 = Math.PI * 1.5;
            a1 = Math.PI * 2;
          }
          if (corner === "BL") {
            ax = x + T;
            ay = y;
            a0 = Math.PI * 0.5;
            a1 = Math.PI;
          }
          if (corner === "BR") {
            ax = x;
            ay = y;
            a0 = 0;
            a1 = Math.PI * 0.5;
          }
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.fill();
        };
      }

      function matBump(corner, color) {
        return (ctx, x, y) => {
          ctx.fillStyle = color;
          ctx.fillRect(x, y, T, T);
          let ax, ay, a0, a1;
          if (corner === "TL") {
            ax = x + T;
            ay = y + T;
            a0 = Math.PI;
            a1 = Math.PI * 1.5;
          }
          if (corner === "TR") {
            ax = x;
            ay = y + T;
            a0 = Math.PI * 1.5;
            a1 = Math.PI * 2;
          }
          if (corner === "BL") {
            ax = x + T;
            ay = y;
            a0 = Math.PI * 0.5;
            a1 = Math.PI;
          }
          if (corner === "BR") {
            ax = x;
            ay = y;
            a0 = 0;
            a1 = Math.PI * 0.5;
          }
          ctx.fillStyle = FW;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.fill();
        };
      }

      function slope(dir) {
        const FACE = {
          U: "#72c45a",
          UL: "#65bc52",
          UR: "#509e40",
          L: "#50a03c",
          R: "#2d6228",
          DL: "#1e5216",
          DR: "#184510",
          D: "#1c4d18",
        };
        return (ctx, x, y) => {
          ctx.fillStyle = FACE[dir];
          ctx.fillRect(x, y, T, T);
          const a = T * 0.1;
          ctx.strokeStyle = FW;
          ctx.lineWidth = 1.5;
          ctx.lineJoin = "round";
          for (let qx = 1; qx <= 3; qx += 2) {
            for (let qy = 1; qy <= 3; qy += 2) {
              const cx = x + (qx * T) / 4,
                cy = y + (qy * T) / 4;
              ctx.beginPath();
              if (dir === "R") {
                ctx.moveTo(cx - a, cy - a);
                ctx.lineTo(cx + a, cy);
                ctx.lineTo(cx - a, cy + a);
              }
              if (dir === "L") {
                ctx.moveTo(cx + a, cy - a);
                ctx.lineTo(cx - a, cy);
                ctx.lineTo(cx + a, cy + a);
              }
              if (dir === "U") {
                ctx.moveTo(cx - a, cy + a);
                ctx.lineTo(cx, cy - a);
                ctx.lineTo(cx + a, cy + a);
              }
              if (dir === "D") {
                ctx.moveTo(cx - a, cy - a);
                ctx.lineTo(cx, cy + a);
                ctx.lineTo(cx + a, cy - a);
              }
              if (dir === "UL") {
                ctx.moveTo(cx + a, cy);
                ctx.lineTo(cx - a, cy - a);
                ctx.lineTo(cx, cy + a);
              }
              if (dir === "UR") {
                ctx.moveTo(cx - a, cy);
                ctx.lineTo(cx + a, cy - a);
                ctx.lineTo(cx, cy + a);
              }
              if (dir === "DL") {
                ctx.moveTo(cx + a, cy);
                ctx.lineTo(cx - a, cy + a);
                ctx.lineTo(cx, cy - a);
              }
              if (dir === "DR") {
                ctx.moveTo(cx - a, cy);
                ctx.lineTo(cx + a, cy + a);
                ctx.lineTo(cx, cy - a);
              }
              ctx.stroke();
            }
          }
        };
      }

      function ghostWall(dir) {
        return (ctx, x, y) => {
          ctx.fillStyle = WL;
          ctx.fillRect(x, y, T, T);
          ctx.strokeStyle = WL_E;
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 0.5, y + 0.5, T - 1, T - 1);
          const a = T * 0.1;
          ctx.strokeStyle = "#d4dcd4";
          ctx.lineWidth = 1.5;
          ctx.lineJoin = "round";
          for (let qx = 1; qx <= 3; qx += 2) {
            for (let qy = 1; qy <= 3; qy += 2) {
              const cx = x + (qx * T) / 4,
                cy = y + (qy * T) / 4;
              ctx.beginPath();
              if (dir === "R") {
                ctx.moveTo(cx - a, cy - a);
                ctx.lineTo(cx + a, cy);
                ctx.lineTo(cx - a, cy + a);
              }
              if (dir === "L") {
                ctx.moveTo(cx + a, cy - a);
                ctx.lineTo(cx - a, cy);
                ctx.lineTo(cx + a, cy + a);
              }
              if (dir === "U") {
                ctx.moveTo(cx - a, cy + a);
                ctx.lineTo(cx, cy - a);
                ctx.lineTo(cx + a, cy + a);
              }
              if (dir === "D") {
                ctx.moveTo(cx - a, cy - a);
                ctx.lineTo(cx, cy + a);
                ctx.lineTo(cx + a, cy - a);
              }
              if (dir === "UR") {
                ctx.moveTo(cx - a, cy);
                ctx.lineTo(cx + a, cy - a);
                ctx.lineTo(cx, cy + a);
              }
              if (dir === "UL") {
                ctx.moveTo(cx + a, cy);
                ctx.lineTo(cx - a, cy - a);
                ctx.lineTo(cx, cy + a);
              }
              if (dir === "DR") {
                ctx.moveTo(cx - a, cy);
                ctx.lineTo(cx + a, cy + a);
                ctx.lineTo(cx, cy - a);
              }
              if (dir === "DL") {
                ctx.moveTo(cx + a, cy);
                ctx.lineTo(cx - a, cy + a);
                ctx.lineTo(cx, cy - a);
              }
              ctx.stroke();
            }
          }
        };
      }

      function lava() {
        return (ctx, x, y) => {
          ctx.fillStyle = "#b02000";
          ctx.fillRect(x, y, T, T);
        };
      }

      function lavaDiag(tri) {
        return (ctx, x, y) => {
          ctx.fillStyle = FW;
          ctx.fillRect(x, y, T, T);
          ctx.fillStyle = LVA;
          ctx.beginPath();
          if (tri === "UR") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x + T, y + T);
          }
          if (tri === "LL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          }
          if (tri === "UL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x, y + T);
          }
          if (tri === "LR") {
            ctx.moveTo(x + T, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          }
          ctx.closePath();
          ctx.fill();
        };
      }

      function teleporter(
        bg = "#1a0830",
        ring1 = "#9030d0",
        ring2 = "#c070ff",
      ) {
        return (ctx, x, y) => {
          const hx = x + T / 2,
            hy = y + T / 2;
          ctx.fillStyle = bg;
          ctx.beginPath();
          ctx.arc(hx, hy, T / 2 - 1, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = ring1;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(hx, hy, T * 0.36, 0, Math.PI * 2);
          ctx.stroke();
          ctx.strokeStyle = ring2;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(hx, hy, T * 0.16, 0, Math.PI * 2);
          ctx.stroke();
        };
      }

      function swap() {
        return (ctx, x, y) => {
          const cx = x + T / 2,
            cy = y + T / 2;
          ctx.fillStyle = "#c08000";
          ctx.beginPath();
          ctx.arc(cx, cy, T / 2 - 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#805000";
          ctx.beginPath();
          ctx.arc(cx, cy, T / 2 - 5, 0, Math.PI * 2);
          ctx.fill();
          const hw = T * 0.27,
            hs = 2.5;
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 1.5;
          ctx.lineJoin = "round";
          ctx.beginPath();
          ctx.moveTo(cx - hw, cy - hs);
          ctx.lineTo(cx + hw, cy - hs);
          ctx.moveTo(cx + hw - 4, cy - hs - 3);
          ctx.lineTo(cx + hw, cy - hs);
          ctx.lineTo(cx + hw - 4, cy - hs + 3);
          ctx.moveTo(cx + hw, cy + hs);
          ctx.lineTo(cx - hw, cy + hs);
          ctx.moveTo(cx - hw + 4, cy + hs - 3);
          ctx.lineTo(cx - hw, cy + hs);
          ctx.lineTo(cx - hw + 4, cy + hs + 3);
          ctx.stroke();
        };
      }

      function diagWall(fw, face = WL, edge = WL_E, showChev = false) {
        return (ctx, x, y) => {
          ctx.fillStyle = face;
          ctx.beginPath();
          if (fw === "LL")      { ctx.moveTo(x, y);     ctx.lineTo(x + T, y);     ctx.lineTo(x + T, y + T); }
          else if (fw === "UR") { ctx.moveTo(x, y);     ctx.lineTo(x, y + T);     ctx.lineTo(x + T, y + T); }
          else if (fw === "LR") { ctx.moveTo(x, y);     ctx.lineTo(x + T, y);     ctx.lineTo(x, y + T);     }
          else                  { ctx.moveTo(x + T, y); ctx.lineTo(x, y + T);     ctx.lineTo(x + T, y + T); }
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = edge;
          ctx.lineWidth = 1;
          ctx.beginPath();
          if (fw === "LL") {
            ctx.moveTo(x, y);       ctx.lineTo(x + T, y);
            ctx.moveTo(x + T, y);   ctx.lineTo(x + T, y + T);
            ctx.moveTo(x, y);       ctx.lineTo(x + T, y + T);
          } else if (fw === "UR") {
            ctx.moveTo(x, y);       ctx.lineTo(x, y + T);
            ctx.moveTo(x, y + T);   ctx.lineTo(x + T, y + T);
            ctx.moveTo(x, y);       ctx.lineTo(x + T, y + T);
          } else if (fw === "LR") {
            ctx.moveTo(x, y);       ctx.lineTo(x + T, y);
            ctx.moveTo(x, y);       ctx.lineTo(x, y + T);
            ctx.moveTo(x + T, y);   ctx.lineTo(x, y + T);
          } else {
            ctx.moveTo(x + T, y);   ctx.lineTo(x + T, y + T);
            ctx.moveTo(x, y + T);   ctx.lineTo(x + T, y + T);
            ctx.moveTo(x + T, y);   ctx.lineTo(x, y + T);
          }
          ctx.stroke();
          if (showChev) {
            let p1x, p1y, p2x, p2y;
            if (fw === "LL") {
              p1x = x + T * 0.78;
              p1y = y + T * 0.44;
              p2x = x + T * 0.55;
              p2y = y + T * 0.22;
            }
            if (fw === "UR") {
              p1x = x + T * 0.22;
              p1y = y + T * 0.56;
              p2x = x + T * 0.45;
              p2y = y + T * 0.78;
            }
            if (fw === "LR") {
              p1x = x + T * 0.22;
              p1y = y + T * 0.44;
              p2x = x + T * 0.45;
              p2y = y + T * 0.22;
            }
            if (fw === "UL") {
              p1x = x + T * 0.56;
              p1y = y + T * 0.78;
              p2x = x + T * 0.78;
              p2y = y + T * 0.56;
            }
            const a = T * 0.09;
            ctx.strokeStyle = "rgba(255,255,255,0.55)";
            ctx.lineWidth = 1.5;
            ctx.lineJoin = "round";
            [
              [p1x, p1y],
              [p2x, p2y],
            ].forEach(([pcx, pcy]) => {
              ctx.beginPath();
              if (fw === "LL") {
                ctx.moveTo(pcx + a, pcy);
                ctx.lineTo(pcx - a, pcy + a);
                ctx.lineTo(pcx, pcy - a);
              }
              if (fw === "UR") {
                ctx.moveTo(pcx - a, pcy);
                ctx.lineTo(pcx + a, pcy - a);
                ctx.lineTo(pcx, pcy + a);
              }
              if (fw === "LR") {
                ctx.moveTo(pcx - a, pcy);
                ctx.lineTo(pcx + a, pcy + a);
                ctx.lineTo(pcx, pcy - a);
              }
              if (fw === "UL") {
                ctx.moveTo(pcx + a, pcy);
                ctx.lineTo(pcx - a, pcy - a);
                ctx.lineTo(pcx, pcy + a);
              }
              ctx.stroke();
            });
          }
        };
      }

      function curve(corner, face = WL, edge = WL_E) {
        return (ctx, x, y) => {
          let ax, ay, a0, a1;
          if (corner === "TL") {

          }
          if (corner === "BR") {
            ax = x;

            a0 = 0;
            a1 = Math.PI * 0.5;
          }
          ctx.fillStyle = face;
          ctx.beginPath();
          ctx.rect(x, y, T, T);
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.fill('evenodd');
          ctx.strokeStyle = edge;
          ctx.lineWidth = 1;

      let selRect = null; // {c0,r0,c1,r1} current normalized rect

      function selNorm(a, b) {
        return {
          c0: Math.min(a.col, b.col),
          r0: Math.min(a.row, b.row),
          c1: Math.max(a.col, b.col),
          r1: Math.max(a.row, b.row),
        };
      }
      function inSel(col, row) {
        if (!selRect || selPhase === "drawing") return false;
        return (
          col >= selRect.c0 &&
          col <= selRect.c1 &&
          row >= selRect.r0 &&
          row <= selRect.r1
        );
      }
      function liftSel() {
        const { c0, r0, c1, r1 } = selRect;
        selW = c1 - c0 + 1;
        selH = r1 - r0 + 1;
        selBuf = [];
        for (let r = r0; r <= r1; r++) {
          const row = [];
          for (let c = c0; c <= c1; c++) {
            row.push({
              g: groundGrid[r]?.[c] ?? ".",
              w: wallGrid[r]?.[c] ?? ".",
            });
            groundGrid[r][c] = ".";
            wallGrid[r][c] = ".";
          }
          selBuf.push(row);
        }
        selOrigin = { c: c0, r: r0 };
        selPos = { c: c0, r: r0 };
      }
      function dropSel() {
        if (!selBuf) return;
        for (let r = 0; r < selH; r++)
          for (let c = 0; c < selW; c++) {

          }
        clearSel();
      }
      function cancelSel() {
        if (selBuf && selOrigin)
          for (let r = 0; r < selH; r++)
            for (let c = 0; c < selW; c++) {
              const gc = selOrigin.c + c,
                gr = selOrigin.r + r;
              if (gr >= 0 && gr < mapH && gc >= 0 && gc < mapW) {
                groundGrid[gr][gc] = selBuf[r][c].g;
                wallGrid[gr][gc] = selBuf[r][c].w;
              }
            }
        clearSel();
      }
      function clearSel() {
        selPhase = null;
        selRect = null;
        selBuf = null;
        selOrigin = null;
        selPos = null;
        dragAnchor = null;
        selW = 0;
        selH = 0;
      }

      function pasteSel() {
        if (!clipboard || !lastMouseEvt) return;
        const cell = cellAt(lastMouseEvt);
        const r0 = cell.row,
          c0 = cell.col;
        for (let r = 0; r < clipboard.length; r++) {
          for (let c = 0; c < clipboard[r].length; c++) {
            const tr = r0 + r,
              tc = c0 + c;
            if (tr < 0 || tr >= mapH || tc < 0 || tc >= mapW) continue;
            const cell = clipboard[r][c];
            if (cell.w !== ".") wallGrid[tr][tc] = cell.w;
            if (cell.g !== ".") groundGrid[tr][tc] = cell.g;
          }
        }
        render();
      }

      function onSelMousedown(e) {
        e.preventDefault();
        const cell = cellAt(e);
        if (selPhase === "selected" && inSel(cell.col, cell.row)) {
          dragAnchor = cell;
          selPhase = "dragging";
        } else {
          cancelSel();
          selAnchor = cell;
          selRect = selNorm(cell, cell);
          selPhase = "drawing";
        }
        render();
      }
      function onSelMousemove(e) {
        if (!selPhase) return;
        const cell = cellAt(e);
        if (selPhase === "drawing") {
          selRect = selNorm(selAnchor, cell);
          render();
        } else if (selPhase === "dragging") {
          const dc = cell.col - dragAnchor.col,
            dr = cell.row - dragAnchor.row;
          selPos = { c: selOrigin.c + dc, r: selOrigin.r + dr };
          selRect = {
            c0: selPos.c,
            r0: selPos.r,
            c1: selPos.c + selW - 1,
            r1: selPos.r + selH - 1,
          };
          render();
        }
      }
      function onSelMouseup() {
        if (selPhase === "drawing") {
          if (selRect.c0 === selRect.c1 && selRect.r0 === selRect.r1) {
            clearSel();
            render();
            return;
          }
          liftSel();
          selPhase = "selected";
          render();
        } else if (selPhase === "dragging") {
          dropSel();
          render();
        }
      }

      function initGrid(w, h, preserve) {
        const gnd = [],
          wls = [];
        for (let r = 0; r < h; r++) {
          gnd[r] = [];
          wls[r] = [];
          for (let c = 0; c < w; c++) {
            gnd[r][c] =
              preserve && groundGrid[r]?.[c] != null ? groundGrid[r][c] : ".";
            wls[r][c] =
              preserve && wallGrid[r]?.[c] != null ? wallGrid[r][c] : ".";
          }
        }
        groundGrid = gnd;
        wallGrid = wls;
        mapW = w;
        mapH = h;
      }

      // ── Canvas ────────────────────────────────────────────────────────────────────

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = mapW * T;
        canvas.height = mapH * T;
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let r = 0; r < mapH; r++) {
          for (let c = 0; c < mapW; c++) {
            const x = c * T,
              y = r * T;
            const gCh = groundGrid[r][c];
            const wCh = wallGrid[r][c];
            const gTile = TILE_BY_CHAR[gCh] || TILE_BY_CHAR["."];
            const wTile = wCh !== "." ? TILE_BY_CHAR[wCh] || null : null;
            gTile.d(ctx, x, y);
            if (wTile) wTile.d(ctx, x, y);
            ctx.strokeStyle = "rgba(0,0,0,0.18)";
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x, y, T, T);
          }
        }

        // Selection drawing rect
        if (selPhase === "drawing" && selRect) {
          const bx = selRect.c0 * T,
            by = selRect.r0 * T;
          const bw = (selRect.c1 - selRect.c0 + 1) * T,
            bh = (selRect.r1 - selRect.r0 + 1) * T;
          ctx.fillStyle = "rgba(80,160,255,0.15)";
          ctx.fillRect(bx, by, bw, bh);
          ctx.strokeStyle = "#4af";
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 3]);
          ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
          ctx.setLineDash([]);
        }

        // Floating selection buffer
        if (
          (selPhase === "selected" || selPhase === "dragging") &&
          selBuf &&
          selPos
        ) {
          ctx.save();
          ctx.globalAlpha = selPhase === "dragging" ? 0.82 : 1;
          for (let r = 0; r < selH; r++)
            for (let c = 0; c < selW; c++) {
              const px = (selPos.c + c) * T,
                py = (selPos.r + r) * T;
              const cell = selBuf[r][c];
              const gT = TILE_BY_CHAR[cell.g] || TILE_BY_CHAR["."];
              const wT = cell.w !== "." ? TILE_BY_CHAR[cell.w] || null : null;
              gT.d(ctx, px, py);
              if (wT) wT.d(ctx, px, py);
              ctx.strokeStyle = "rgba(0,0,0,0.18)";
              ctx.lineWidth = 0.5;
              ctx.strokeRect(px, py, T, T);
            }
          ctx.restore();
          const bx = selRect.c0 * T,
            by = selRect.r0 * T,
            bw = selW * T,
            bh = selH * T;
          ctx.strokeStyle = "#4af";
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 3]);
          ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
          ctx.setLineDash([]);
        }
      }

      // ── Input ─────────────────────────────────────────────────────────────────────

      function cellAt(e) {
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width;
        const sy = canvas.height / rect.height;
        return {
          col: Math.floor(((e.clientX - rect.left) * sx) / T),
          row: Math.floor(((e.clientY - rect.top) * sy) / T),
        };
      }

      let lastPaintCell = null;

      function setCell(col, row) {
        if (row < 0 || row >= mapH || col < 0 || col >= mapW) return;
        if (paintChar === ".") {
          wallGrid[row][col] = ".";
          groundGrid[row][col] = ".";
          return;
        } else if (isWallChar(paintChar)) {
          wallGrid[row][col] = paintChar;
        } else {
          groundGrid[row][col] = paintChar;
        }
      }

      function paintLine(c0, r0, c1, r1) {
        const dc = Math.abs(c1 - c0),
          dr = Math.abs(r1 - r0);
        const sc = c0 < c1 ? 1 : -1,
          sr = r0 < r1 ? 1 : -1;
        let err = dc - dr,
          c = c0,
          r = r0;
        while (true) {
          setCell(c, r);
          if (c === c1 && r === r1) break;
          const e2 = 2 * err;
          if (e2 > -dr) {
            err -= dr;
            c += sc;
          }
          if (e2 < dc) {
            err += dc;
            r += sr;
          }
        }
      }

      function paintAt(e) {
        const cell = cellAt(e);
        if (lastPaintCell) {
          paintLine(lastPaintCell.col, lastPaintCell.row, cell.col, cell.row);
        } else {
          setCell(cell.col, cell.row);
        }
        lastPaintCell = cell;
        render();
      }

      canvas.addEventListener("mousedown", (e) => {
        if (selMode) {
          onSelMousedown(e);
          return;
        }
        e.preventDefault();
        painting = true;
        paintChar = e.button === 2 ? "." : selected;
        lastPaintCell = null;
        paintAt(e);
      });
      canvas.addEventListener("mousemove", (e) => {
        lastMouseEvt = e;
        if (selMode) {
          onSelMousemove(e);
          return;
        }
        if (painting) paintAt(e);
      });
      canvas.addEventListener("mouseup", (e) => {
        if (selMode) {
          onSelMouseup(e);
          return;
        }
        painting = false;
        lastPaintCell = null;
      });
      canvas.addEventListener("mouseleave", () => {
        if (!selMode) {
          painting = false;
          lastPaintCell = null;
        }
      });
      canvas.addEventListener("contextmenu", (e) => e.preventDefault());

      // ── Palette ───────────────────────────────────────────────────────────────────

      const paletteEl = document.getElementById("palette");

      const SG_ORDER = ["", "full", "diag", "curve", "bump"];
      const SG_LABEL = {
        full: "Full",
        diag: "Diagonal",
        curve: "Concave",
        bump: "Convex",
      };
      const SW = 26; // swatch px

      function buildPalette() {
        // Group by g, then by sg
        const groups = {};
        TILES.forEach((t) => {
          (groups[t.g] = groups[t.g] || {})[t.sg] = groups[t.g][t.sg] || [];
          groups[t.g][t.sg].push(t);
        });

        Object.entries(groups).forEach(([gname, subs]) => {
          const grp = document.createElement("div");
          grp.className = "pg";
          const title = document.createElement("div");
          title.className = "pg-title";
          title.textContent = gname;
          grp.appendChild(title);

          SG_ORDER.forEach((sgKey) => {
            const tiles = subs[sgKey];
            if (!tiles || !tiles.length) return;

            if (SG_LABEL[sgKey]) {
              const sgLbl = document.createElement("div");
              sgLbl.className = "sg-title";
              sgLbl.textContent = SG_LABEL[sgKey];
              grp.appendChild(sgLbl);
            }

            const row = document.createElement("div");
            row.className = "tile-row";
            tiles.forEach((t) => {
              const btn = document.createElement("div");
              btn.className =
                "swatch-btn" + (t.c === selected ? " active" : "");
              btn.dataset.char = t.c;
              btn.title = t.l;

              const sw = document.createElement("canvas");
              sw.width = sw.height = SW;
              const sc = sw.getContext("2d");
              sc.save();
              sc.scale(SW / T, SW / T);
              t.d(sc, 0, 0);
              sc.restore();

              btn.appendChild(sw);
              btn.addEventListener("click", () => {
                selected = t.c;
                document
                  .querySelectorAll(".swatch-btn")
                  .forEach((b) => b.classList.remove("active"));
                btn.classList.add("active");
                if (selMode) {
                  selMode = false;
                  btnSelect.classList.remove("active-tool");
                }
              });
              row.appendChild(btn);
            });
            grp.appendChild(row);
          });
          paletteEl.appendChild(grp);
        });
      }

      // ── Toolbar ───────────────────────────────────────────────────────────────────

      document.getElementById("btn-resize").addEventListener("click", () => {
        const w = Math.max(
          5,
          parseInt(document.getElementById("iw").value) || mapW,
        );
        const h = Math.max(
          5,
          parseInt(document.getElementById("ih").value) || mapH,
        );
        initGrid(w, h, true);
        resizeCanvas();
        render();
      });

      document.getElementById("btn-load").addEventListener("click", () => {
        document.getElementById("file-in").click();
      });

      document.getElementById("file-in").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const text = ev.target.result;
          let gnd, wls, w, h;
          if (text.trim().startsWith("{")) {
            // JSON format
            const data = JSON.parse(text);
            w = data.width;
            h = data.height;
            gnd = data.ground.map((r) => {
              const a = r.split("");
              while (a.length < w) a.push(".");
              return a;
            });
            wls = data.walls.map((r) => {
              const a = r.split("");
              while (a.length < w) a.push(".");
              return a;
            });
          } else {
            // Legacy text: auto-split into layers
            const rows = text
              .trimEnd()
              .split("\n")
              .map((r) => r.split(""));
            h = rows.length;
            w = Math.max(...rows.map((r) => r.length));
            rows.forEach((r) => {
              while (r.length < w) r.push(".");
            });
            gnd = rows.map((row) =>
              row.map((ch) => (WALL_CHARS_SET.has(ch) ? "." : ch)),
            );
            wls = rows.map((row) =>
              row.map((ch) => (WALL_CHARS_SET.has(ch) ? ch : ".")),
            );
          }
          groundGrid = gnd;
          wallGrid = wls;
          mapW = w;
          mapH = h;
          document.getElementById("iw").value = w;
          document.getElementById("ih").value = h;
          document.getElementById("iname").value = file.name.replace(
            /\.(txt|json)$/,
            "",
          );
          resizeCanvas();
          render();
        };
        reader.readAsText(file);
        e.target.value = "";
      });

      document
        .getElementById("btn-save")
        .addEventListener("click", async () => {
          const name = document.getElementById("iname").value.trim() || "map";
          const content = JSON.stringify(
            {
              width: mapW,
              height: mapH,
              ground: groundGrid.map((r) => r.join("")),
              walls: wallGrid.map((r) => r.join("")),
            },
            null,
            2,
          );
          const filename = name + ".json";
          const statusEl = document.getElementById("status");
          if (window.showSaveFilePicker) {
            try {
              const handle = await window.showSaveFilePicker({
                suggestedName: filename,
                types: [{ description: "Canagolf Map", accept: { "application/json": [".json"] } }],
              });
              const writable = await handle.createWritable();
              await writable.write(content);
              await writable.close();
              statusEl.textContent = `✓ Saved ${handle.name}`;
            } catch (e) {
              if (e.name !== "AbortError") statusEl.textContent = "✗ Save failed";
              return;
            }
          } else {
            const url = URL.createObjectURL(new Blob([content], { type: "application/json" }));
            Object.assign(document.createElement("a"), { href: url, download: filename }).click();
            URL.revokeObjectURL(url);
            statusEl.textContent = `✓ Downloaded ${filename}`;
          }
          setTimeout(() => { statusEl.textContent = ""; }, 2500);
        });

      // Select tool button
      const btnSelect = document.getElementById("btn-select");
      btnSelect.addEventListener("click", () => {
        selMode = !selMode;
        if (!selMode) {
          cancelSel();
          render();
        }
        btnSelect.classList.toggle("active-tool", selMode);
      });

      // Keyboard: Escape cancels selection; tile chars select tile in paint mode
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          cancelSel();
          render();
          return;
        }
        if (e.target.tagName === "INPUT") return;
        // Select-mode shortcuts
        if (
          selMode &&
          (e.key === "Delete" || e.key === "Backspace") &&
          selPhase === "selected"
        ) {
          clearSel();
          render();
          e.preventDefault();
          return;
        }
        if (selMode && e.ctrlKey && e.key === "c" && selPhase === "selected") {
          clipboard = selBuf.map((row) => row.map((cell) => ({ ...cell })));
          cancelSel();
          render();
          e.preventDefault();
          return;
        }
        if (e.ctrlKey && e.key === "v" && clipboard) {
          pasteSel();
          e.preventDefault();
          return;
        }
        if (selMode) return;
        const tile = TILE_BY_CHAR[e.key];
        if (!tile) return;
        selected = e.key;
        document
          .querySelectorAll(".swatch-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.char === e.key),
          );
      });

      // ── Init ──────────────────────────────────────────────────────────────────────

      initGrid(mapW, mapH, false);
      // Default start + hole in ground layer
      groundGrid[Math.floor(mapH / 2)][2] = "S";
      groundGrid[Math.floor(mapH / 2)][mapW - 3] = "O";
      buildPalette();
      resizeCanvas();
      render();

      // Auto-load _test map on startup
      fetch("/maps/_test.json").then(r => r.ok ? r.json() : null).then(data => {
        if (!data) return;
        groundGrid = data.ground.map(r => { const a = r.split(""); while (a.length < data.width) a.push("."); return a; });
        wallGrid   = data.walls.map(r  => { const a = r.split(""); while (a.length < data.width) a.push("."); return a; });
        mapW = data.width; mapH = data.height;
        document.getElementById("iw").value    = mapW;
        document.getElementById("ih").value    = mapH;
        document.getElementById("iname").value = "_test";
        resizeCanvas(); render();
      }).catch(() => {});
</script>
  </body>
</html>
