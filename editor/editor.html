<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Canagolf — Map Editor</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #1a1a1a;
        color: #ccc;
        font-family: monospace;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Toolbar ── */
      #toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 12px;
        background: #252525;
        border-bottom: 1px solid #383838;
        flex-shrink: 0;
      }
      #toolbar label {
        display: flex;
        align-items: center;
        gap: 4px;
        color: #aaa;
      }
      #toolbar input[type="number"] {
        width: 48px;
        background: #333;
        color: #ddd;
        border: 1px solid #555;
        padding: 3px 5px;
        font-family: monospace;
      }
      #toolbar input[type="text"] {
        width: 110px;
        background: #333;
        color: #ddd;
        border: 1px solid #555;
        padding: 3px 5px;
        font-family: monospace;
      }
      .sep {
        width: 1px;
        height: 22px;
        background: #444;
        flex-shrink: 0;
      }
      button {
        background: #2e2e2e;
        color: #ccc;
        border: 1px solid #555;
        padding: 4px 10px;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
      }
      button:hover {
        background: #898989;
      }
      button.primary {
        background: #1e5c1e;
        border-color: #3a8a3a;
        color: #dfd;
      }
      button.primary:hover {
        background: #256025;
      }
      button.active-tool {
        background: #1a3060;
        border-color: #4a70cc;
        color: #adf;
      }
      #status {
        color: #7a7;
        font-size: 11px;
      }
      #resize-anchor {
        display: grid;
        grid-template-columns: repeat(3, 9px);
        grid-template-rows: repeat(3, 9px);
        gap: 2px;
      }
      #resize-anchor button {
        width: 9px; height: 9px;
        padding: 0; border: 1px solid #555;
        background: #333; cursor: pointer;
        font-size: 0;
      }
      #resize-anchor button:hover { background: #555; }
      #resize-anchor button.active { background: #4a70cc; border-color: #7aacff; }
      /* .spacer {
        flex: 1;
      } */

      /* ── Main area ── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Palette ── */
      #palette {
        width: 360px;
        background: #1e1e1e;
        border-right: 1px solid #333;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
      }
      .pal-cols {
        display: flex;
        flex-direction: row;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }
      .pal-col {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        padding: 6px 4px;
        border-right: 1px solid #2a2a2a;
      }
      .pal-col:last-child {
        border-right: none;
      }
      .pal-col-title {
        font-size: 9px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-align: center;
        padding: 2px 0 4px;
        border-bottom: 1px solid #333;
        margin-bottom: 6px;
      }
      .pg {
        margin-bottom: 8px;
      }
      .pg-title {
        font-size: 10px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding-bottom: 3px;
        margin-bottom: 4px;
        border-bottom: 1px solid #2a2a2a;
      }
      .sg-title {
        font-size: 9px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin: 3px 0 2px;
      }
      .tile-row {
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        margin-bottom: 2px;
      }
      .swatch-btn {
        width: 28px;
        height: 28px;
        cursor: pointer;
        flex-shrink: 0;
        border: 2px solid transparent;
        border-radius: 2px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .swatch-btn:hover {
        border-color: #555;
      }
      .swatch-btn.active {
        border-color: #4a9a4a;
      }

      /* ── Modifier strip ── */
      .mod-strip {
        flex-shrink: 0;
        padding: 5px 6px 3px;
        background: #181818;
        border-bottom: 1px solid #2e2e2e;
      }
      .mod-strip-title {
        font-size: 9px;
        color: #777;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }
      .mod-row {
        display: flex;
        align-items: center;
        gap: 2px;
        margin-bottom: 2px;
      }
      .mod-row-label {
        font-size: 8px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        width: 44px;
        flex-shrink: 0;
        text-align: right;
        padding-right: 4px;
      }
      .mod-btn {
        width: 26px;
        height: 26px;
        cursor: pointer;
        flex-shrink: 0;
        border: 2px solid transparent;
        border-radius: 2px;
        padding: 0;
        background: #252525;
        display: block;
      }
      .mod-btn:hover:not(.mod-disabled) {
        border-color: #555;
      }
      .mod-btn.active {
        border-color: #4a9a4a;
      }
      .mod-btn.mod-disabled {
        opacity: 0.3;
        pointer-events: none;
      }

      /* ── Canvas wrap ── */
      #canvas-wrap {
        flex: 1;
        overflow: auto;
        background: #111;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
      }
      #canvas {
        display: block;
        cursor: crosshair;
      }

      /* ── Map Browser ── */
      #map-browser {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      #map-browser:not([hidden]) {
        display: flex;
      }
      #map-browser-inner {
        background: #1e1e1e;
        border-radius: 10px;
        padding: 16px;
        width: min(90vw, 820px);
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #map-browser-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
        font-size: 14px;
        color: #ccc;
        flex-shrink: 0;
      }
      #map-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 10px;
        overflow-y: auto;
      }
      .map-card {
        background: #2a2a2a;
        border-radius: 6px;
        cursor: pointer;
        outline: 2px solid transparent;
        transition: outline-color 0.1s;
        display: flex;
        flex-direction: column;
      }
      .map-card:hover {
        outline-color: #5cba47;
      }
      .map-card img {
        width: 100%;
        aspect-ratio: 3/2;
        object-fit: cover;
        display: block;
      }
      .map-card-placeholder {
        width: 100%;
        aspect-ratio: 3/2;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #333;
      }
      .map-card-thumb {
        position: relative;
        width: 100%;
      }
      .map-card-name {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 14px 7px 5px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.72));
        color: #fff;
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <label
        >W <input type="number" id="iw" value="30" min="5" max="100"
      /></label>
      <label
        >H <input type="number" id="ih" value="20" min="5" max="80"
      /></label>
      <div id="resize-anchor" title="Resize anchor"></div>
      <button id="btn-resize">Resize</button>
      <div class="sep"></div>
      <button id="btn-load">Load ▲</button>
      <input type="file" id="file-in" accept=".txt,.json" hidden />
      <div class="sep"></div>
      <button id="btn-select">⬚ Select</button>
      <button id="btn-browse">📂 Browse</button>
      <label>Name <input type="text" id="iname" value="hole1" /></label>
      <button class="primary" id="btn-save">Save ▼</button>
      <span id="status"></span>
    </div>

    <div id="main">
      <div id="palette"></div>
      <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
    </div>

    <div id="map-browser" hidden>
      <div id="map-browser-inner">
        <div id="map-browser-header">
          <span>Maps</span>
          <button id="btn-browser-close">✕</button>
        </div>
        <div id="map-grid"></div>
      </div>
    </div>

    <script>
      // ── Wall char set (mirrors physics.js WALL_CHARS_SET) ────────────────────────
      const WALL_CHARS_SET = new Set([
        "#",
        "+",
        "~",
        "i",
        "j",
        "k",
        "l",
        "N",
        "P",
        "Q",
        "R",
        "(",
        ")",
        "[",
        "]",
        "1",
        "2",
        "3",
        "4",
        "T",
        "U",
        "V",
        "X",
        "{",
        "}",
        "@",
        "$",
        "5",
        "6",
        "7",
        "8",
        "Y",
        "Z",
        "0",
        "9",
        "%",
        "&",
        "*",
        "_",
        "J",
        "K",
        "L",
        "M",
        "-",
        "!",
        ",",
        ";",
        "\\",
      ]);

      function isWallChar(c) {
        return WALL_CHARS_SET.has(c);
      }

      const _SAND_G = new Set([
        "A",
        "a",
        "b",
        "c",
        "d",
        "m",
        "n",
        "o",
        "p",
        "q",
        "r",
        "s",
        "t",
      ]);
      const _WATER_G = new Set([
        "W",
        "e",
        "f",
        "g",
        "h",
        "u",
        "x",
        "y",
        "z",
        "B",
        "C",
        "D",
        "E",
      ]);
      const _LAVA_G = new Set([
        "w",
        "'",
        ":",
        "`",
        '"',
        "Ā",
        "ā",
        "Ă",
        "ă",
        "Ą",
        "ą",
        "Ć",
        "ć",
      ]);
      function getOpenColor(tile) {
        if (tile === "A") return SND;
        if (tile === "W") return WTR;
        if (tile === "w") return LVA;
        return FW;
      }

      // ── Tile definitions ──────────────────────────────────────────────────────────

      const T = 24; // pixels per tile in editor
      const FW = "#3a7a35"; // fairway
      const WL = "#A0A0A0"; // wall
      const WL_E = "#898989"; // wall edge
      const SND = "#c8a84b"; // sand
      const WTR = "#2a7fd4"; // water
      const BNCY = "#e8940a"; // bouncy face
      const BNCY_E = "#9a5c00"; // bouncy edge
      const STKY = "#3a4e7a"; // sticky face
      const STKY_E = "#1a2a4a"; // sticky edge
      const LVA = "#b02000"; // lava

      function fill(color) {
        return (ctx, x, y) => {
          ctx.fillStyle = color;
          ctx.fillRect(x, y, T, T);
        };
      }

      function drawWall(ctx, x, y) {
        ctx.fillStyle = WL;
        ctx.fillRect(x, y, T, T);
        ctx.strokeStyle = "#898989";
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, T - 1, T - 1);
      }

      function drawHole(ctx, x, y) {
        ctx.fillStyle = FW;
        ctx.fillRect(x, y, T, T);
        ctx.fillStyle = "#0a0a0a";
        ctx.beginPath();
        ctx.arc(x + T / 2, y + T / 2, (T * 3) / 8, 0, Math.PI * 2);
        ctx.fill();
      }

      function circleWall() {
        return (ctx, x, y) => {
          ctx.fillStyle = WL;
          ctx.beginPath();
          ctx.arc(x + T / 2, y + T / 2, T / 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = WL_E;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(x + T / 2, y + T / 2, T / 2, 0, Math.PI * 2);
          ctx.stroke();
        };
      }

      function drawStart(ctx, x, y) {
        ctx.fillStyle = FW;
        ctx.fillRect(x, y, T, T);
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${T * 0.55}px monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("S", x + T / 2, y + T / 2);
      }

      function diag(tri, color) {
        return (ctx, x, y) => {
          ctx.fillStyle = FW;
          ctx.fillRect(x, y, T, T);
          ctx.fillStyle = color;
          ctx.beginPath();
          if (tri === "UR") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x + T, y + T);
          }
          if (tri === "LL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          }
          if (tri === "UL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x, y + T);
          }
          if (tri === "LR") {
            ctx.moveTo(x + T, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          }
          ctx.closePath();
          ctx.fill();
        };
      }

      function matCurve(corner, color) {
        return (ctx, x, y) => {
          ctx.fillStyle = FW;
          ctx.fillRect(x, y, T, T);
          let ax, ay, a0, a1;
          if (corner === "TL") {
            ax = x + T;
            ay = y + T;
            a0 = Math.PI;
            a1 = Math.PI * 1.5;
          }
          if (corner === "TR") {
            ax = x;
            ay = y + T;
            a0 = Math.PI * 1.5;
            a1 = Math.PI * 2;
          }
          if (corner === "BL") {
            ax = x + T;
            ay = y;
            a0 = Math.PI * 0.5;
            a1 = Math.PI;
          }
          if (corner === "BR") {
            ax = x;
            ay = y;
            a0 = 0;
            a1 = Math.PI * 0.5;
          }
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.fill();
        };
      }

      function matBump(corner, color) {
        return (ctx, x, y) => {
          ctx.fillStyle = color;
          ctx.fillRect(x, y, T, T);
          let ax, ay, a0, a1;
          if (corner === "TL") {
            ax = x + T;
            ay = y + T;
            a0 = Math.PI;
            a1 = Math.PI * 1.5;
          }
          if (corner === "TR") {
            ax = x;
            ay = y + T;
            a0 = Math.PI * 1.5;
            a1 = Math.PI * 2;
          }
          if (corner === "BL") {
            ax = x + T;
            ay = y;
            a0 = Math.PI * 0.5;
            a1 = Math.PI;
          }
          if (corner === "BR") {
            ax = x;
            ay = y;
            a0 = 0;
            a1 = Math.PI * 0.5;
          }
          ctx.fillStyle = FW;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.fill();
        };
      }

      function slope(dir) {
        return (ctx, x, y) => {
          ctx.fillStyle = SLOPE_FACE[dir];
          ctx.fillRect(x, y, T, T);
          drawSlopeArrows(ctx, dir, x, y);
        };
      }

      const SLOPE_FACE = {
        U: "#72c45a", UL: "#65bc52", UR: "#509e40",
        L: "#50a03c", R: "#2d6228",
        DL: "#1e5216", DR: "#184510", D: "#1c4d18",
      };

      function drawSlopeArrows(ctx, dir, x, y) {
        const a = T * 0.1;
        ctx.strokeStyle = FW;
        ctx.lineWidth = 1.5;
        ctx.lineJoin = "round";
        for (let qx = 1; qx <= 3; qx += 2) {
          for (let qy = 1; qy <= 3; qy += 2) {
            const cx = x + (qx * T) / 4, cy = y + (qy * T) / 4;
            ctx.beginPath();
            if (dir === "R") { ctx.moveTo(cx - a, cy - a); ctx.lineTo(cx + a, cy); ctx.lineTo(cx - a, cy + a); }
            if (dir === "L") { ctx.moveTo(cx + a, cy - a); ctx.lineTo(cx - a, cy); ctx.lineTo(cx + a, cy + a); }
            if (dir === "U") { ctx.moveTo(cx - a, cy + a); ctx.lineTo(cx, cy - a); ctx.lineTo(cx + a, cy + a); }
            if (dir === "D") { ctx.moveTo(cx - a, cy - a); ctx.lineTo(cx, cy + a); ctx.lineTo(cx + a, cy - a); }
            if (dir === "UL") { ctx.moveTo(cx + a, cy); ctx.lineTo(cx - a, cy - a); ctx.lineTo(cx, cy + a); }
            if (dir === "UR") { ctx.moveTo(cx - a, cy); ctx.lineTo(cx + a, cy - a); ctx.lineTo(cx, cy + a); }
            if (dir === "DL") { ctx.moveTo(cx + a, cy); ctx.lineTo(cx - a, cy + a); ctx.lineTo(cx, cy - a); }
            if (dir === "DR") { ctx.moveTo(cx - a, cy); ctx.lineTo(cx + a, cy + a); ctx.lineTo(cx, cy - a); }
            ctx.stroke();
          }
        }
      }

      // Shape info for drawTileShapeOnly — built after SLOPE_FACE is defined
      let LAYER_SHAPE_INFO = null;
      function getLayerShapeInfo() {
        if (LAYER_SHAPE_INFO) return LAYER_SHAPE_INFO;
        LAYER_SHAPE_INFO = {};
        // Full terrain tiles
        [['A',SND],['W',WTR],['w',LVA]].forEach(([c,col]) =>
          LAYER_SHAPE_INFO[c] = { type:'full', color:col });
        // Slope full tiles
        Object.entries({U:'^',D:'v',L:'<',R:'>',UL:'F',UR:'G',DL:'H',DR:'I'}).forEach(([dir,c]) =>
          LAYER_SHAPE_INFO[c] = { type:'slope', color:SLOPE_FACE[dir], dir });
        // Diagonal sand/water/lava
        [['a','UR',SND],['b','LL',SND],['c','UL',SND],['d','LR',SND],
         ['e','UR',WTR],['f','LL',WTR],['g','UL',WTR],['h','LR',WTR],
         ["'",'LL',LVA],[':','UR',LVA],['`','LR',LVA],['"','UL',LVA]].forEach(([c,tri,col]) =>
          LAYER_SHAPE_INFO[c] = { type:'tri', color:col, tri });
        // Curves sand/water/lava
        [['m','TL',SND],['n','TR',SND],['o','BL',SND],['p','BR',SND],
         ['u','TL',WTR],['x','TR',WTR],['y','BL',WTR],['z','BR',WTR],
         ['Ā','TL',LVA],['ā','TR',LVA],['Ă','BL',LVA],['ă','BR',LVA]].forEach(([c,corner,col]) =>
          LAYER_SHAPE_INFO[c] = { type:'curve', color:col, corner });
        // Bumps sand/water/lava
        [['q','TL',SND],['r','TR',SND],['s','BL',SND],['t','BR',SND],
         ['B','TL',WTR],['C','TR',WTR],['D','BL',WTR],['E','BR',WTR],
         ['Ą','TL',LVA],['ą','TR',LVA],['Ć','BL',LVA],['ć','BR',LVA]].forEach(([c,corner,col]) =>
          LAYER_SHAPE_INFO[c] = { type:'bump', color:col, corner });
        // Slope diagonals
        [['Ĉ','UR','UR'],['ĉ','DL','LL'],['Ċ','UL','UL'],['ċ','DR','LR'],
         // Cardinal slope diagonals
         ['Ĕ','U','UR'],['ĕ','U','LL'],['Ė','U','UL'],['ė','U','LR'],
         ['Ġ','D','UR'],['ġ','D','LL'],['Ģ','D','UL'],['ģ','D','LR'],
         ['Ĭ','L','UR'],['ĭ','L','LL'],['Į','L','UL'],['į','L','LR'],
         ['ĸ','R','UR'],['Ĺ','R','LL'],['ĺ','R','UL'],['Ļ','R','LR'],
         // Diagonal slope additional diagonals
         ['ń','UL','UR'],['Ņ','UL','LL'],['ņ','UL','LR'],
         ['ō','UR','LL'],['Ŏ','UR','UL'],['ŏ','UR','LR'],
         ['Ŗ','DL','UR'],['ŗ','DL','UL'],['Ř','DL','LR'],
         ['ş','DR','UR'],['Š','DR','LL'],['š','DR','UL'],
        ].forEach(([c,dir,tri]) =>
          LAYER_SHAPE_INFO[c] = { type:'slope-tri', color:SLOPE_FACE[dir], dir, tri });
        // Slope curves
        [['Č','UL','TL'],['č','UR','TR'],['Ď','DL','BL'],['ď','DR','BR'],
         // Cardinal slope curves
         ['Ę','U','TL'],['ę','U','TR'],['Ě','U','BL'],['ě','U','BR'],
         ['Ĥ','D','TL'],['ĥ','D','TR'],['Ħ','D','BL'],['ħ','D','BR'],
         ['İ','L','TL'],['ı','L','TR'],['Ũ','L','BL'],['ũ','L','BR'],
         ['ļ','R','TL'],['Ľ','R','TR'],['ľ','R','BL'],['Ŀ','R','BR'],
         // Diagonal slope additional curves
         ['Ň','UL','TR'],['ň','UL','BL'],['ŉ','UL','BR'],
         ['Ő','UR','TL'],['ő','UR','BL'],['Œ','UR','BR'],
         ['ř','DL','TL'],['Ś','DL','TR'],['ś','DL','BR'],
         ['Ţ','DR','TL'],['ţ','DR','TR'],['Ť','DR','BL'],
        ].forEach(([c,dir,corner]) =>
          LAYER_SHAPE_INFO[c] = { type:'slope-curve', color:SLOPE_FACE[dir], dir, corner });
        // Slope bumps
        [['Đ','UL','TL'],['đ','UR','TR'],['Ē','DL','BL'],['ē','DR','BR'],
         // Cardinal slope bumps
         ['Ĝ','U','TL'],['ĝ','U','TR'],['Ğ','U','BL'],['ğ','U','BR'],
         ['Ĩ','D','TL'],['ĩ','D','TR'],['Ī','D','BL'],['ī','D','BR'],
         ['Ĵ','L','TL'],['ĵ','L','TR'],['Ķ','L','BL'],['ķ','L','BR'],
         ['ŀ','R','TL'],['Ł','R','TR'],['ł','R','BL'],['Ń','R','BR'],
         // Diagonal slope additional bumps
         ['Ŋ','UL','TR'],['ŋ','UL','BL'],['Ō','UL','BR'],
         ['œ','UR','TL'],['Ŕ','UR','BL'],['ŕ','UR','BR'],
         ['Ŝ','DL','TL'],['ŝ','DL','TR'],['Ş','DL','BR'],
         ['ť','DR','TL'],['Ŧ','DR','TR'],['ŧ','DR','BL'],
        ].forEach(([c,dir,corner]) =>
          LAYER_SHAPE_INFO[c] = { type:'slope-bump', color:SLOPE_FACE[dir], dir, corner });
        return LAYER_SHAPE_INFO;
      }

      function shapeOf(ch) {
        const info = getLayerShapeInfo()[ch];
        if (!info) return ch;
        let key = info.type;
        if (info.dir) key += '-' + info.dir;
        if (info.tri) key += '-' + info.tri;
        if (info.corner) key += '-' + info.corner;
        return key;
      }

      function drawTileShapeOnly(ctx, x, y, ch) {
        const info = getLayerShapeInfo()[ch];
        if (!info) return;
        function arcParams(corner) {
          if (corner === 'TL') return [x + T, y + T, Math.PI, Math.PI * 1.5];
          if (corner === 'TR') return [x,     y + T, Math.PI * 1.5, Math.PI * 2];
          if (corner === 'BL') return [x + T, y,     Math.PI * 0.5, Math.PI];
          return                       [x,     y,     0, Math.PI * 0.5];
        }
        if (info.type === 'full') {
          ctx.fillStyle = info.color; ctx.fillRect(x, y, T, T); return;
        }
        if (info.type === 'slope') {
          ctx.fillStyle = info.color; ctx.fillRect(x, y, T, T);
          drawSlopeArrows(ctx, info.dir, x, y); return;
        }
        if (info.type === 'tri' || info.type === 'slope-tri') {
          const tri = info.tri;
          ctx.save(); ctx.beginPath();
          if (tri==='UR') { ctx.moveTo(x,y);   ctx.lineTo(x+T,y);   ctx.lineTo(x+T,y+T); }
          if (tri==='LL') { ctx.moveTo(x,y);   ctx.lineTo(x,y+T);   ctx.lineTo(x+T,y+T); }
          if (tri==='UL') { ctx.moveTo(x,y);   ctx.lineTo(x+T,y);   ctx.lineTo(x,y+T);   }
          if (tri==='LR') { ctx.moveTo(x+T,y); ctx.lineTo(x,y+T);   ctx.lineTo(x+T,y+T); }
          ctx.closePath(); ctx.clip();
          ctx.fillStyle = info.color; ctx.fillRect(x, y, T, T);
          if (info.type === 'slope-tri') drawSlopeArrows(ctx, info.dir, x, y);
          ctx.restore(); return;
        }
        if (info.type === 'curve' || info.type === 'slope-curve') {
          const [ax, ay, a0, a1] = arcParams(info.corner);
          ctx.save(); ctx.beginPath();
          ctx.moveTo(ax, ay); ctx.arc(ax, ay, T, a0, a1, false); ctx.closePath(); ctx.clip();
          ctx.fillStyle = info.color; ctx.fillRect(x, y, T, T);
          if (info.type === 'slope-curve') drawSlopeArrows(ctx, info.dir, x, y);
          ctx.restore(); return;
        }
        if (info.type === 'bump' || info.type === 'slope-bump') {
          const [ax, ay, a0, a1] = arcParams(info.corner);
          ctx.save(); ctx.beginPath();
          ctx.rect(x, y, T, T);
          ctx.moveTo(ax, ay); ctx.arc(ax, ay, T, a0, a1, false); ctx.closePath();
          ctx.clip('evenodd');
          ctx.fillStyle = info.color; ctx.fillRect(x, y, T, T);
          if (info.type === 'slope-bump') drawSlopeArrows(ctx, info.dir, x, y);
          ctx.restore();
        }
      }

      function slopeDiag(dir, tri) {
        const color = SLOPE_FACE[dir];
        return (ctx, x, y) => {
          ctx.fillStyle = FW;
          ctx.fillRect(x, y, T, T);
          ctx.fillStyle = color;
          ctx.beginPath();
          if (tri === "UR") { ctx.moveTo(x, y); ctx.lineTo(x + T, y); ctx.lineTo(x + T, y + T); }
          if (tri === "LL") { ctx.moveTo(x, y); ctx.lineTo(x, y + T); ctx.lineTo(x + T, y + T); }
          if (tri === "UL") { ctx.moveTo(x, y); ctx.lineTo(x + T, y); ctx.lineTo(x, y + T); }
          if (tri === "LR") { ctx.moveTo(x + T, y); ctx.lineTo(x, y + T); ctx.lineTo(x + T, y + T); }
          ctx.closePath();
          ctx.fill();
          ctx.save();
          ctx.beginPath();
          if (tri === "UR") { ctx.moveTo(x, y); ctx.lineTo(x + T, y); ctx.lineTo(x + T, y + T); }
          if (tri === "LL") { ctx.moveTo(x, y); ctx.lineTo(x, y + T); ctx.lineTo(x + T, y + T); }
          if (tri === "UL") { ctx.moveTo(x, y); ctx.lineTo(x + T, y); ctx.lineTo(x, y + T); }
          if (tri === "LR") { ctx.moveTo(x + T, y); ctx.lineTo(x, y + T); ctx.lineTo(x + T, y + T); }
          ctx.closePath();
          ctx.clip();
          drawSlopeArrows(ctx, dir, x, y);
          ctx.restore();
        };
      }

      function slopeCurve(dir, corner) {
        const color = SLOPE_FACE[dir];
        return (ctx, x, y) => {
          ctx.fillStyle = FW;
          ctx.fillRect(x, y, T, T);
          let ax, ay, a0, a1;
          if (corner === "TL") { ax = x + T; ay = y + T; a0 = Math.PI; a1 = Math.PI * 1.5; }
          if (corner === "TR") { ax = x;     ay = y + T; a0 = Math.PI * 1.5; a1 = Math.PI * 2; }
          if (corner === "BL") { ax = x + T; ay = y;     a0 = Math.PI * 0.5; a1 = Math.PI; }
          if (corner === "BR") { ax = x;     ay = y;     a0 = 0; a1 = Math.PI * 0.5; }
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.fill();
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.clip();
          drawSlopeArrows(ctx, dir, x, y);
          ctx.restore();
        };
      }

      function slopeBump(dir, corner) {
        const color = SLOPE_FACE[dir];
        return (ctx, x, y) => {
          let ax, ay, a0, a1;
          if (corner === "TL") { ax = x + T; ay = y + T; a0 = Math.PI; a1 = Math.PI * 1.5; }
          if (corner === "TR") { ax = x;     ay = y + T; a0 = Math.PI * 1.5; a1 = Math.PI * 2; }
          if (corner === "BL") { ax = x + T; ay = y;     a0 = Math.PI * 0.5; a1 = Math.PI; }
          if (corner === "BR") { ax = x;     ay = y;     a0 = 0; a1 = Math.PI * 0.5; }
          // Fill tile with slope color, then cut out the concave area with fairway
          ctx.fillStyle = color;
          ctx.fillRect(x, y, T, T);
          ctx.fillStyle = FW;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.fill();
          // Arrows over the whole tile — invisible on fairway (FW-on-FW), visible on bump
          drawSlopeArrows(ctx, dir, x, y);
        };
      }

      function getModColor() {
        if (selected === "#") return WL;
        if (selected === "+") return BNCY;
        if (selected === "~") return STKY;
        if (selected === "A") return SND;
        if (selected === "W") return WTR;
        if (selected === "w") return LVA;
        if (selected === "^") return SLOPE_FACE["U"];
        if (selected === "v") return SLOPE_FACE["D"];
        if (selected === "<") return SLOPE_FACE["L"];
        if (selected === ">") return SLOPE_FACE["R"];
        if (selected === "F") return SLOPE_FACE["UL"];
        if (selected === "G") return SLOPE_FACE["UR"];
        if (selected === "H") return SLOPE_FACE["DL"];
        if (selected === "I") return SLOPE_FACE["DR"];
        return WL;
      }

      function drawModPreview(sc, key, color) {
        const S = 26;
        sc.clearRect(0, 0, S, S);
        if (key === "full") {
          sc.fillStyle = color;
          sc.fillRect(0, 0, S, S);
          return;
        }
        const sep = key.indexOf("-");
        const type = key.slice(0, sep);
        const orient = key.slice(sep + 1);
        if (type === "diag") {
          sc.fillStyle = color;
          sc.beginPath();
          if (orient === "UR") { sc.moveTo(0,0); sc.lineTo(S,0); sc.lineTo(S,S); }
          if (orient === "LL") { sc.moveTo(0,0); sc.lineTo(0,S); sc.lineTo(S,S); }
          if (orient === "UL") { sc.moveTo(0,0); sc.lineTo(S,0); sc.lineTo(0,S); }
          if (orient === "LR") { sc.moveTo(S,0); sc.lineTo(0,S); sc.lineTo(S,S); }
          sc.closePath();
          sc.fill();
          return;
        }
        let ax, ay, a0, a1;
        if (orient === "TL") { ax = S; ay = S; a0 = Math.PI; a1 = Math.PI * 1.5; }
        if (orient === "TR") { ax = 0; ay = S; a0 = Math.PI * 1.5; a1 = Math.PI * 2; }
        if (orient === "BL") { ax = S; ay = 0; a0 = Math.PI * 0.5; a1 = Math.PI; }
        if (orient === "BR") { ax = 0; ay = 0; a0 = 0; a1 = Math.PI * 0.5; }
        if (type === "curve") {
          sc.fillStyle = color;
          sc.beginPath();
          sc.moveTo(ax, ay);
          sc.arc(ax, ay, S, a0, a1, false);
          sc.closePath();
          sc.fill();
        } else if (type === "bump") {
          sc.save();
          sc.beginPath();
          sc.rect(0, 0, S, S);
          sc.moveTo(ax, ay);
          sc.arc(ax, ay, S, a0, a1, false);
          sc.closePath();
          sc.clip("evenodd");
          sc.fillStyle = color;
          sc.fillRect(0, 0, S, S);
          sc.restore();
        }
      }

      function ghostWall(dir) {
        return (ctx, x, y) => {
          ctx.fillStyle = WL;
          ctx.fillRect(x, y, T, T);
          ctx.strokeStyle = WL_E;
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 0.5, y + 0.5, T - 1, T - 1);
          const a = T * 0.1;
          ctx.strokeStyle = "#d4dcd4";
          ctx.lineWidth = 1.5;
          ctx.lineJoin = "round";
          for (let qx = 1; qx <= 3; qx += 2) {
            for (let qy = 1; qy <= 3; qy += 2) {
              const cx = x + (qx * T) / 4,
                cy = y + (qy * T) / 4;
              ctx.beginPath();
              if (dir === "R") {
                ctx.moveTo(cx - a, cy - a);
                ctx.lineTo(cx + a, cy);
                ctx.lineTo(cx - a, cy + a);
              }
              if (dir === "L") {
                ctx.moveTo(cx + a, cy - a);
                ctx.lineTo(cx - a, cy);
                ctx.lineTo(cx + a, cy + a);
              }
              if (dir === "U") {
                ctx.moveTo(cx - a, cy + a);
                ctx.lineTo(cx, cy - a);
                ctx.lineTo(cx + a, cy + a);
              }
              if (dir === "D") {
                ctx.moveTo(cx - a, cy - a);
                ctx.lineTo(cx, cy + a);
                ctx.lineTo(cx + a, cy - a);
              }
              if (dir === "UR") {
                ctx.moveTo(cx - a, cy);
                ctx.lineTo(cx + a, cy - a);
                ctx.lineTo(cx, cy + a);
              }
              if (dir === "UL") {
                ctx.moveTo(cx + a, cy);
                ctx.lineTo(cx - a, cy - a);
                ctx.lineTo(cx, cy + a);
              }
              if (dir === "DR") {
                ctx.moveTo(cx - a, cy);
                ctx.lineTo(cx + a, cy + a);
                ctx.lineTo(cx, cy - a);
              }
              if (dir === "DL") {
                ctx.moveTo(cx + a, cy);
                ctx.lineTo(cx - a, cy + a);
                ctx.lineTo(cx, cy - a);
              }
              ctx.stroke();
            }
          }
        };
      }

      function lava() {
        return (ctx, x, y) => {
          ctx.fillStyle = "#b02000";
          ctx.fillRect(x, y, T, T);
        };
      }

      function lavaDiag(tri) {
        return (ctx, x, y) => {
          ctx.fillStyle = FW;
          ctx.fillRect(x, y, T, T);
          ctx.fillStyle = LVA;
          ctx.beginPath();
          if (tri === "UR") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x + T, y + T);
          }
          if (tri === "LL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          }
          if (tri === "UL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x, y + T);
          }
          if (tri === "LR") {
            ctx.moveTo(x + T, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          }
          ctx.closePath();
          ctx.fill();
        };
      }

      function teleporter(
        bg = "#1a0830",
        ring1 = "#9030d0",
        ring2 = "#c070ff",
      ) {
        return (ctx, x, y) => {
          const hx = x + T / 2,
            hy = y + T / 2;
          ctx.fillStyle = bg;
          ctx.beginPath();
          ctx.arc(hx, hy, T / 2 - 1, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = ring1;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(hx, hy, T * 0.36, 0, Math.PI * 2);
          ctx.stroke();
          ctx.strokeStyle = ring2;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(hx, hy, T * 0.16, 0, Math.PI * 2);
          ctx.stroke();
        };
      }

      function swap() {
        return (ctx, x, y) => {
          const cx = x + T / 2,
            cy = y + T / 2;
          ctx.fillStyle = "#c08000";
          ctx.beginPath();
          ctx.arc(cx, cy, T / 2 - 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#805000";
          ctx.beginPath();
          ctx.arc(cx, cy, T / 2 - 5, 0, Math.PI * 2);
          ctx.fill();
          const hw = T * 0.27,
            hs = 2.5;
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 1.5;
          ctx.lineJoin = "round";
          ctx.beginPath();
          ctx.moveTo(cx - hw, cy - hs);
          ctx.lineTo(cx + hw, cy - hs);
          ctx.moveTo(cx + hw - 4, cy - hs - 3);
          ctx.lineTo(cx + hw, cy - hs);
          ctx.lineTo(cx + hw - 4, cy - hs + 3);
          ctx.moveTo(cx + hw, cy + hs);
          ctx.lineTo(cx - hw, cy + hs);
          ctx.moveTo(cx - hw + 4, cy + hs - 3);
          ctx.lineTo(cx - hw, cy + hs);
          ctx.lineTo(cx - hw + 4, cy + hs + 3);
          ctx.stroke();
        };
      }

      function diagWall(fw, face = WL, edge = WL_E, showChev = false) {
        return (ctx, x, y) => {
          ctx.fillStyle = face;
          ctx.beginPath();
          if (fw === "LL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x + T, y + T);
          } else if (fw === "UR") {
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          } else if (fw === "LR") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.lineTo(x, y + T);
          } else {
            ctx.moveTo(x + T, y);
            ctx.lineTo(x, y + T);
            ctx.lineTo(x + T, y + T);
          }
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = edge;
          ctx.lineWidth = 1;
          ctx.beginPath();
          if (fw === "LL") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.moveTo(x + T, y);
            ctx.lineTo(x + T, y + T);
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y + T);
          } else if (fw === "UR") {
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + T);
            ctx.moveTo(x, y + T);
            ctx.lineTo(x + T, y + T);
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y + T);
          } else if (fw === "LR") {
            ctx.moveTo(x, y);
            ctx.lineTo(x + T, y);
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + T);
            ctx.moveTo(x + T, y);
            ctx.lineTo(x, y + T);
          } else {
            ctx.moveTo(x + T, y);
            ctx.lineTo(x + T, y + T);
            ctx.moveTo(x, y + T);
            ctx.lineTo(x + T, y + T);
            ctx.moveTo(x + T, y);
            ctx.lineTo(x, y + T);
          }
          ctx.stroke();
          if (showChev) {
            let p1x, p1y, p2x, p2y;
            if (fw === "LL") {
              p1x = x + T * 0.78;
              p1y = y + T * 0.44;
              p2x = x + T * 0.55;
              p2y = y + T * 0.22;
            }
            if (fw === "UR") {
              p1x = x + T * 0.22;
              p1y = y + T * 0.56;
              p2x = x + T * 0.45;
              p2y = y + T * 0.78;
            }
            if (fw === "LR") {
              p1x = x + T * 0.22;
              p1y = y + T * 0.44;
              p2x = x + T * 0.45;
              p2y = y + T * 0.22;
            }
            if (fw === "UL") {
              p1x = x + T * 0.56;
              p1y = y + T * 0.78;
              p2x = x + T * 0.78;
              p2y = y + T * 0.56;
            }
            const a = T * 0.09;
            ctx.strokeStyle = "rgba(255,255,255,0.55)";
            ctx.lineWidth = 1.5;
            ctx.lineJoin = "round";
            [
              [p1x, p1y],
              [p2x, p2y],
            ].forEach(([pcx, pcy]) => {
              ctx.beginPath();
              if (fw === "LL") {
                ctx.moveTo(pcx + a, pcy);
                ctx.lineTo(pcx - a, pcy + a);
                ctx.lineTo(pcx, pcy - a);
              }
              if (fw === "UR") {
                ctx.moveTo(pcx - a, pcy);
                ctx.lineTo(pcx + a, pcy - a);
                ctx.lineTo(pcx, pcy + a);
              }
              if (fw === "LR") {
                ctx.moveTo(pcx - a, pcy);
                ctx.lineTo(pcx + a, pcy + a);
                ctx.lineTo(pcx, pcy - a);
              }
              if (fw === "UL") {
                ctx.moveTo(pcx + a, pcy);
                ctx.lineTo(pcx - a, pcy - a);
                ctx.lineTo(pcx, pcy + a);
              }
              ctx.stroke();
            });
          }
        };
      }

      function curve(corner, face = WL, edge = WL_E) {
        return (ctx, x, y) => {
          let ax, ay, a0, a1;
          if (corner === "TL") {
            ax = x + T;
            ay = y + T;
            a0 = Math.PI;
            a1 = Math.PI * 1.5;
          }
          if (corner === "TR") {
            ax = x;
            ay = y + T;
            a0 = Math.PI * 1.5;
            a1 = Math.PI * 2;
          }
          if (corner === "BL") {
            ax = x + T;
            ay = y;
            a0 = Math.PI * 0.5;
            a1 = Math.PI;
          }
          if (corner === "BR") {
            ax = x;
            ay = y;
            a0 = 0;
            a1 = Math.PI * 0.5;
          }
          ctx.fillStyle = face;
          ctx.beginPath();
          ctx.rect(x, y, T, T);
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.fill("evenodd");
          ctx.strokeStyle = edge;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(ax, ay, T, a0, a1, false);
          const ocx = ax + T * (Math.cos(a0) + Math.cos(a1));
          const ocy = ay + T * (Math.sin(a0) + Math.sin(a1));
          ctx.moveTo(ocx, ocy);
          ctx.lineTo(ax + T * Math.cos(a0), ay + T * Math.sin(a0));
          ctx.moveTo(ocx, ocy);
          ctx.lineTo(ax + T * Math.cos(a1), ay + T * Math.sin(a1));
          ctx.stroke();
        };
      }

      function bump(corner, face = WL, edge = WL_E) {
        return (ctx, x, y) => {
          let ax, ay, a0, a1;
          if (corner === "TL") {
            ax = x + T;
            ay = y + T;
            a0 = Math.PI;
            a1 = Math.PI * 1.5;
          }
          if (corner === "TR") {
            ax = x;
            ay = y + T;
            a0 = Math.PI * 1.5;
            a1 = Math.PI * 2;
          }
          if (corner === "BL") {
            ax = x + T;
            ay = y;
            a0 = Math.PI * 0.5;
            a1 = Math.PI;
          }
          if (corner === "BR") {
            ax = x;
            ay = y;
            a0 = 0;
            a1 = Math.PI * 0.5;
          }
          ctx.fillStyle = face;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = edge;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(ax, ay, T, a0, a1, false);
          ctx.moveTo(ax, ay);
          ctx.lineTo(ax + T * Math.cos(a0), ay + T * Math.sin(a0));
          ctx.moveTo(ax, ay);
          ctx.lineTo(ax + T * Math.cos(a1), ay + T * Math.sin(a1));
          ctx.stroke();
          if (face !== WL) {
            const midAngle = (a0 + a1) / 2;
            const spread = Math.PI / 8;
            const a = T * 0.09;
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 1.5;
            ctx.lineJoin = "round";
            [midAngle - spread, midAngle + spread].forEach((angle) => {
              const pcx = ax + T * 0.52 * Math.cos(angle);
              const pcy = ay + T * 0.52 * Math.sin(angle);
              const nx = Math.cos(angle),
                ny = Math.sin(angle);
              const tx = -ny,
                ty = nx;
              ctx.beginPath();
              ctx.moveTo(pcx - tx * a, pcy - ty * a);
              ctx.lineTo(pcx + nx * a, pcy + ny * a);
              ctx.lineTo(pcx + tx * a, pcy + ty * a);
              ctx.stroke();
            });
          }
        };
      }

      // Compact catalog → generated slope partial tile entries (96 tiles)

          // lava: "diag-UR" means lava fills the UR area visually (char ':' / lavaDiag "UR")
          "full":"w",  "diag-UR":":",  "diag-LL":"'",  "diag-UL":'"',  "diag-LR":"`",
          "curve-TL":"Ā","curve-TR":"ā","curve-BL":"Ă","curve-BR":"ă",
          "bump-TL":"Ą", "bump-TR":"ą", "bump-BL":"Ć", "bump-BR":"ć",
        },
        // Cardinal slopes — shape variants for all orientations
        "^": { "full":"^","diag-UR":"Ĕ","diag-LL":"ĕ","diag-UL":"Ė","diag-LR":"ė","curve-TL":"Ę","curve-TR":"ę","curve-BL":"Ě","curve-BR":"ě","bump-TL":"Ĝ","bump-TR":"ĝ","bump-BL":"Ğ","bump-BR":"ğ" },
        "v": { "full":"v","diag-UR":"Ġ","diag-LL":"ġ","diag-UL":"Ģ","diag-LR":"ģ","curve-TL":"Ĥ","curve-TR":"ĥ","curve-BL":"Ħ","curve-BR":"ħ","bump-TL":"Ĩ","bump-TR":"ĩ","bump-BL":"Ī","bump-BR":"ī" },
        "<": { "full":"<","diag-UR":"Ĭ","diag-LL":"ĭ","diag-UL":"Į","diag-LR":"į","curve-TL":"İ","curve-TR":"ı","curve-BL":"Ũ","curve-BR":"ũ","bump-TL":"Ĵ","bump-TR":"ĵ","bump-BL":"Ķ","bump-BR":"ķ" },
        ">": { "full":">","diag-UR":"ĸ","diag-LL":"Ĺ","diag-UL":"ĺ","diag-LR":"Ļ","curve-TL":"ļ","curve-TR":"Ľ","curve-BL":"ľ","curve-BR":"Ŀ","bump-TL":"ŀ","bump-TR":"Ł","bump-BL":"ł","bump-BR":"Ń" },
        // Diagonal slopes — each orientation now produces a distinct tile
        "F": { // Slope UL ↖ — natural: diag-UL→Ċ, curve-TL→Č, bump-TL→Đ
          "full":"F",
          "diag-UR":"ń","diag-LL":"Ņ","diag-UL":"Ċ","diag-LR":"ņ",
          "curve-TL":"Č","curve-TR":"Ň","curve-BL":"ň","curve-BR":"ŉ",
          "bump-TL":"Đ","bump-TR":"Ŋ","bump-BL":"ŋ","bump-BR":"Ō",
        },
        "G": { // Slope UR ↗ — natural: diag-UR→Ĉ, curve-TR→č, bump-TR→đ
          "full":"G",
          "diag-UR":"Ĉ","diag-LL":"ō","diag-UL":"Ŏ","diag-LR":"ŏ",
          "curve-TL":"Ő","curve-TR":"č","curve-BL":"ő","curve-BR":"Œ",
          "bump-TL":"œ","bump-TR":"đ","bump-BL":"Ŕ","bump-BR":"ŕ",
        },
        "H": { // Slope DL ↙ — natural: diag-LL→ĉ, curve-BL→Ď, bump-BL→Ē
          "full":"H",
          "diag-UR":"Ŗ","diag-LL":"ĉ","diag-UL":"ŗ","diag-LR":"Ř",
          "curve-TL":"ř","curve-TR":"Ś","curve-BL":"Ď","curve-BR":"ś",
          "bump-TL":"Ŝ","bump-TR":"ŝ","bump-BL":"Ē","bump-BR":"Ş",
        },
        "I": { // Slope DR ↘ — natural: diag-LR→ċ, curve-BR→ď, bump-BR→ē
          "full":"I",
          "diag-UR":"ş","diag-LL":"Š","diag-UL":"š","diag-LR":"ċ",
          "curve-TL":"Ţ","curve-TR":"ţ","curve-BL":"Ť","curve-BR":"ď",
          "bump-TL":"ť","bump-TR":"Ŧ","bump-BL":"ŧ","bump-BR":"ē",
        },
      };

      // Reverse map: variant char → { base, mod } for tile picker
      const CHAR_TO_BASE = {};
      Object.entries(VARIANT_MAP).forEach(([base, mods]) => {
        Object.entries(mods).forEach(([mod, ch]) => {
          if (ch !== base && !CHAR_TO_BASE[ch]) CHAR_TO_BASE[ch] = { base, mod };
        });
      });

      // ── State ─────────────────────────────────────────────────────────────────────

      let mapW = 30,
        mapH = 20;
      let groundGrid = []; // surface tiles (base layer)
      let wallGrid = []; // wall/geometry tiles ('.' = empty)
      let groundLayersGrid = []; // extra terrain layers stacked on top [[row][col]=char, ...]
      const history = []; // undo stack
      let resizeAnchorR = 0, resizeAnchorC = 0; // top-left by default

      function snapshot() {
        history.push({
          groundGrid: groundGrid.map(r => [...r]),
          wallGrid: wallGrid.map(r => [...r]),
          groundLayersGrid: groundLayersGrid.map(layer => layer.map(r => [...r])),
          mapW,
          mapH,
        });
      }

      function undo() {
        if (history.length === 0) return;
        const state = history.pop();
        mapW = state.mapW;
        mapH = state.mapH;
        groundGrid = state.groundGrid;
        wallGrid = state.wallGrid;
        groundLayersGrid = state.groundLayersGrid;
        document.getElementById("iw").value = mapW;
        document.getElementById("ih").value = mapH;
        resizeCanvas();
        clearSel();
        render();
      }
      let selected = "#";
      let modifier = "full"; // current shape modifier key
      let painting = false;
      let paintChar = "#";

      // ── Selection state ───────────────────────────────────────────────────────────

      let selMode = false;
      let selPhase = null; // 'drawing' | 'selected' | 'dragging'
      let selAnchor = null; // {col,row} where rect-draw started
      let selRect = null; // {c0,r0,c1,r1} current normalized rect
      let selBuf = null; // 2D array of tile chars (lifted tiles)
      let selOrigin = null; // {c,r} top-left at lift time
      let selPos = null; // {c,r} current top-left (changes during drag)
      let selW = 0,
        selH = 0;
      let dragAnchor = null; // {col,row} cell where selection-move drag started
      let clipboard = null; // copied selBuf for paste
      let lastMouseEvt = null; // last mouse event for paste position

      function selNorm(a, b) {
        return {
          c0: Math.min(a.col, b.col),
          r0: Math.min(a.row, b.row),
          c1: Math.max(a.col, b.col),
          r1: Math.max(a.row, b.row),
        };
      }
      function inSel(col, row) {
        if (!selRect || selPhase === "drawing") return false;
        return (
          col >= selRect.c0 &&
          col <= selRect.c1 &&
          row >= selRect.r0 &&
          row <= selRect.r1
        );
      }
      function liftSel() {
        const { c0, r0, c1, r1 } = selRect;
        selW = c1 - c0 + 1;
        selH = r1 - r0 + 1;
        selBuf = [];
        for (let r = r0; r <= r1; r++) {
          const row = [];
          for (let c = c0; c <= c1; c++) {
            row.push({
              g: groundGrid[r]?.[c] ?? ".",
              w: wallGrid[r]?.[c] ?? ".",
              layers: groundLayersGrid.map(layer => layer[r]?.[c] ?? "."),
            });
            groundGrid[r][c] = ".";
            wallGrid[r][c] = ".";
            groundLayersGrid.forEach(layer => { layer[r][c] = "."; });
          }
          selBuf.push(row);
        }
        pruneEmptyLayers();
        selOrigin = { c: c0, r: r0 };
        selPos = { c: c0, r: r0 };
      }
      function dropSel() {
        if (!selBuf) return;
        for (let r = 0; r < selH; r++)
          for (let c = 0; c < selW; c++) {
            const gc = selPos.c + c, gr = selPos.r + r;
            if (gr < 0 || gr >= mapH || gc < 0 || gc >= mapW) continue;
            groundGrid[gr][gc] = selBuf[r][c].g;
            wallGrid[gr][gc] = selBuf[r][c].w;
            selBuf[r][c].layers.forEach((lch, i) => {
              if (lch !== ".") {
                while (groundLayersGrid.length <= i) groundLayersGrid.push(makeEmptyLayer(mapW, mapH));
                groundLayersGrid[i][gr][gc] = lch;
              }
            });
          }
        clearSel();
      }
      function cancelSel() {
        if (selBuf && selOrigin)
          for (let r = 0; r < selH; r++)
            for (let c = 0; c < selW; c++) {
              const gc = selOrigin.c + c, gr = selOrigin.r + r;
              if (gr >= 0 && gr < mapH && gc >= 0 && gc < mapW) {
                groundGrid[gr][gc] = selBuf[r][c].g;
                wallGrid[gr][gc] = selBuf[r][c].w;
                selBuf[r][c].layers.forEach((lch, i) => {
                  if (lch !== ".") {
                    while (groundLayersGrid.length <= i) groundLayersGrid.push(makeEmptyLayer(mapW, mapH));
                    groundLayersGrid[i][gr][gc] = lch;
                  }
                });
              }
            }
        clearSel();
      }
      function clearSel() {
        selPhase = null;
        selRect = null;
        selBuf = null;
        selOrigin = null;
        selPos = null;
        dragAnchor = null;
        selW = 0;
        selH = 0;
      }

      function pasteSel() {
        if (!clipboard || !lastMouseEvt) return;
        const cell = cellAt(lastMouseEvt);
        const r0 = cell.row,
          c0 = cell.col;
        for (let r = 0; r < clipboard.length; r++) {
          for (let c = 0; c < clipboard[r].length; c++) {
            const tr = r0 + r,
              tc = c0 + c;
            if (tr < 0 || tr >= mapH || tc < 0 || tc >= mapW) continue;
            const cell = clipboard[r][c];
            if (cell.w !== ".") wallGrid[tr][tc] = cell.w;
            if (cell.g !== ".") groundGrid[tr][tc] = cell.g;
          }
        }
        render();
      }

      function onSelMousedown(e) {
        e.preventDefault();
        const cell = cellAt(e);
        if (selPhase === "selected" && inSel(cell.col, cell.row)) {
          dragAnchor = cell;
          selPhase = "dragging";
        } else {
          cancelSel();
          selAnchor = cell;
          selRect = selNorm(cell, cell);
          selPhase = "drawing";
        }
        render();
      }
      function onSelMousemove(e) {
        if (!selPhase) return;
        const cell = cellAt(e);
        if (selPhase === "drawing") {
          selRect = selNorm(selAnchor, cell);
          render();
        } else if (selPhase === "dragging") {
          const dc = cell.col - dragAnchor.col,
            dr = cell.row - dragAnchor.row;
          selPos = { c: selOrigin.c + dc, r: selOrigin.r + dr };
          selRect = {
            c0: selPos.c,
            r0: selPos.r,
            c1: selPos.c + selW - 1,
            r1: selPos.r + selH - 1,
          };
          render();
        }
      }
      function onSelMouseup() {
        if (selPhase === "drawing") {
          if (selRect.c0 === selRect.c1 && selRect.r0 === selRect.r1) {
            clearSel();
            render();
            return;
          }
          snapshot();
          liftSel();
          selPhase = "selected";
          render();
        } else if (selPhase === "dragging") {
          dropSel();
          render();
        }
      }

      function makeEmptyLayer(w, h) {
        return Array.from({ length: h }, () => Array(w).fill("."));
      }

      function pruneEmptyLayers() {
        while (groundLayersGrid.length > 0) {
          const last = groundLayersGrid[groundLayersGrid.length - 1];
          if (last.every(row => row.every(ch => ch === "."))) groundLayersGrid.pop();
          else break;
        }
      }

      function initGrid(w, h, preserve, dr = 0, dc = 0) {
        const gnd = [], wls = [];
        for (let r = 0; r < h; r++) {
          gnd[r] = []; wls[r] = [];
          for (let c = 0; c < w; c++) {
            const srcR = r - dr, srcC = c - dc;
            gnd[r][c] = preserve && groundGrid[srcR]?.[srcC] != null ? groundGrid[srcR][srcC] : ".";
            wls[r][c] = preserve && wallGrid[srcR]?.[srcC] != null ? wallGrid[srcR][srcC] : ".";
          }
        }
        groundGrid = gnd;
        wallGrid = wls;
        groundLayersGrid = groundLayersGrid.map(layer => {
          const nl = makeEmptyLayer(w, h);
          if (preserve) {
            for (let r = 0; r < h; r++)
              for (let c = 0; c < w; c++) {
                const srcR = r - dr, srcC = c - dc;
                if (srcR >= 0 && srcR < layer.length && srcC >= 0 && srcC < (layer[srcR] || []).length)
                  nl[r][c] = layer[srcR][srcC];
              }
          }
          return nl;
        });
        if (!preserve) groundLayersGrid = [];
        pruneEmptyLayers();
        mapW = w;
        mapH = h;
      }

      // ── Canvas ────────────────────────────────────────────────────────────────────

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = mapW * T;
        canvas.height = mapH * T;
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let r = 0; r < mapH; r++) {
          for (let c = 0; c < mapW; c++) {
            const x = c * T,
              y = r * T;
            const gCh = groundGrid[r][c];
            const wCh = wallGrid[r][c];
            const gTile = TILE_BY_CHAR[gCh] || TILE_BY_CHAR["."];
            const wTile = wCh !== "." ? TILE_BY_CHAR[wCh] || null : null;
            gTile.d(ctx, x, y);
            for (const layer of groundLayersGrid) {
              const lCh = layer[r][c];
              if (lCh && lCh !== ".") drawTileShapeOnly(ctx, x, y, lCh);
            }
            if (wTile) wTile.d(ctx, x, y);
            ctx.strokeStyle = "rgba(0,0,0,0.18)";
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x, y, T, T);
          }
        }

        // Selection drawing rect
        if (selPhase === "drawing" && selRect) {
          const bx = selRect.c0 * T,
            by = selRect.r0 * T;
          const bw = (selRect.c1 - selRect.c0 + 1) * T,
            bh = (selRect.r1 - selRect.r0 + 1) * T;
          ctx.fillStyle = "rgba(80,160,255,0.15)";
          ctx.fillRect(bx, by, bw, bh);
          ctx.strokeStyle = "#4af";
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 3]);
          ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
          ctx.setLineDash([]);
        }

        // Floating selection buffer
        if (
          (selPhase === "selected" || selPhase === "dragging") &&
          selBuf &&
          selPos
        ) {
          ctx.save();
          ctx.globalAlpha = selPhase === "dragging" ? 0.82 : 1;
          for (let r = 0; r < selH; r++)
            for (let c = 0; c < selW; c++) {
              const px = (selPos.c + c) * T,
                py = (selPos.r + r) * T;
              const cell = selBuf[r][c];
              const gT = TILE_BY_CHAR[cell.g] || TILE_BY_CHAR["."];
              const wT = cell.w !== "." ? TILE_BY_CHAR[cell.w] || null : null;
              gT.d(ctx, px, py);
              if (wT) wT.d(ctx, px, py);
              ctx.strokeStyle = "rgba(0,0,0,0.18)";
              ctx.lineWidth = 0.5;
              ctx.strokeRect(px, py, T, T);
            }
          ctx.restore();
          const bx = selRect.c0 * T,
            by = selRect.r0 * T,
            bw = selW * T,
            bh = selH * T;
          ctx.strokeStyle = "#4af";
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 3]);
          ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
          ctx.setLineDash([]);
        }
      }

      // ── Input ─────────────────────────────────────────────────────────────────────

      function cellAt(e) {
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width;
        const sy = canvas.height / rect.height;
        return {
          col: Math.floor(((e.clientX - rect.left) * sx) / T),
          row: Math.floor(((e.clientY - rect.top) * sy) / T),
        };
      }

      let lastPaintCell = null;

      function setCell(col, row) {
        if (row < 0 || row >= mapH || col < 0 || col >= mapW) return;
        const resolved = paintChar === "."
          ? "."
          : (VARIANT_MAP[paintChar]?.[modifier] ?? paintChar);
        if (resolved === ".") {
          // Right-click: erase one tile at a time — wall first, then layers top→bottom, then base
          if (wallGrid[row][col] !== ".") {
            wallGrid[row][col] = ".";
            return;
          }
          for (let i = groundLayersGrid.length - 1; i >= 0; i--) {
            if (groundLayersGrid[i][row][col] !== ".") {
              groundLayersGrid[i][row][col] = ".";
              pruneEmptyLayers();
              return;
            }
          }
          groundGrid[row][col] = ".";
        } else if (isWallChar(resolved)) {
          wallGrid[row][col] = resolved;
        } else {
          // Ground tile: replace same-shape tile in-place if one exists, otherwise push
          const newShape = shapeOf(resolved);
          if (groundGrid[row][col] !== "." && shapeOf(groundGrid[row][col]) === newShape) {
            groundGrid[row][col] = resolved;
          } else {
            let replaced = false;
            for (let i = 0; i < groundLayersGrid.length; i++) {
              const cur = groundLayersGrid[i][row][col];
              if (cur !== "." && shapeOf(cur) === newShape) {
                groundLayersGrid[i][row][col] = resolved;
                replaced = true;
                break;
              }
            }
            if (!replaced) {
              if (groundGrid[row][col] === ".") {
                groundGrid[row][col] = resolved;
              } else {
                let pushed = false;
                for (let i = 0; i < groundLayersGrid.length; i++) {
                  if (groundLayersGrid[i][row][col] === ".") {
                    groundLayersGrid[i][row][col] = resolved;
                    pushed = true;
                    break;
                  }
                }
                if (!pushed) {
                  const newLayer = makeEmptyLayer(mapW, mapH);
                  newLayer[row][col] = resolved;
                  groundLayersGrid.push(newLayer);
                }
              }
            }
          }
        }
      }

      function paintLine(c0, r0, c1, r1) {
        const dc = Math.abs(c1 - c0),
          dr = Math.abs(r1 - r0);
        const sc = c0 < c1 ? 1 : -1,
          sr = r0 < r1 ? 1 : -1;
        let err = dc - dr,
          c = c0,
          r = r0;
        while (true) {
          setCell(c, r);
          if (c === c1 && r === r1) break;
          const e2 = 2 * err;
          if (e2 > -dr) {
            err -= dr;
            c += sc;
          }
          if (e2 < dc) {
            err += dc;
            r += sr;
          }
        }
      }

      function paintAt(e) {
        const cell = cellAt(e);
        if (lastPaintCell) {
          paintLine(lastPaintCell.col, lastPaintCell.row, cell.col, cell.row);
        } else {
          setCell(cell.col, cell.row);
        }
        lastPaintCell = cell;
        render();
      }

      canvas.addEventListener("mousedown", (e) => {
        if (selMode) {
          onSelMousedown(e);
          return;
        }
        e.preventDefault();
        // Tile picker: middle-click or Shift+left-click
        if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
          const cell = cellAt(e);
          if (cell.row >= 0 && cell.row < mapH && cell.col >= 0 && cell.col < mapW) {
            const wch = wallGrid[cell.row][cell.col];
            let gch = groundGrid[cell.row][cell.col];
            for (let i = groundLayersGrid.length - 1; i >= 0; i--) {
              const lch = groundLayersGrid[i][cell.row][cell.col];
              if (lch && lch !== ".") { gch = lch; break; }
            }
            const ch = wch !== "." ? wch : gch;
            if (ch !== ".") {
              const lookup = CHAR_TO_BASE[ch];
              if (lookup) {
                selected = lookup.base;
                modifier = lookup.mod;
              } else {
                selected = ch;
                modifier = "full";
              }
              document.querySelectorAll(".swatch-btn").forEach(b =>
                b.classList.toggle("active", b.dataset.char === selected));
              updateModifierStrip();
            }
          }
          return;
        }
        snapshot();
        painting = true;
        paintChar = e.button === 2 ? "." : selected;
        lastPaintCell = null;
        paintAt(e);
      });
      canvas.addEventListener("mousemove", (e) => {
        lastMouseEvt = e;
        if (selMode) {
          onSelMousemove(e);
          return;
        }
        if (painting) paintAt(e);
      });
      canvas.addEventListener("mouseup", (e) => {
        if (selMode) {
          onSelMouseup(e);
          return;
        }
        painting = false;
        lastPaintCell = null;
      });
      canvas.addEventListener("mouseleave", () => {
        if (!selMode) {
          painting = false;
          lastPaintCell = null;
        }
      });
      canvas.addEventListener("contextmenu", (e) => e.preventDefault());

      // ── Palette ───────────────────────────────────────────────────────────────────

      const paletteEl = document.getElementById("palette");

      const SG_ORDER = ["", "full", "diag", "curve", "bump"];
      const SG_LABEL = {
        full: "Full",
        diag: "Diagonal",
        curve: "Concave",
        bump: "Convex",
      };
      const SW = 26; // swatch px

      // Column assignment: which material groups go in each column
      const COL_WALL   = ["Wall", "Bouncy", "Sticky", "Ghost"];
      const COL_GROUND = ["Basic", "Sand", "Water", "Slope", "Lava"];
      const COL_OBJECT = ["Special"];

      function buildPalette() {
        paletteEl.innerHTML = "";

        // ── Modifier strip ──
        const strip = document.createElement("div");
        strip.className = "mod-strip";
        const stripTitle = document.createElement("div");
        stripTitle.className = "mod-strip-title";
        stripTitle.textContent = "Shape modifier";
        strip.appendChild(stripTitle);

        const MOD_ROWS = [
          { label: "",        items: [{ key: "full",     tip: "Full (square)" }] },
          { label: "Diag",    items: [
            { key: "diag-UR", tip: "Diagonal ↗" }, { key: "diag-LL", tip: "Diagonal ↙" },
            { key: "diag-UL", tip: "Diagonal ↖" }, { key: "diag-LR", tip: "Diagonal ↘" },
          ]},
          { label: "Concave", items: [
            { key: "curve-TL", tip: "Concave ↖" }, { key: "curve-TR", tip: "Concave ↗" },
            { key: "curve-BL", tip: "Concave ↙" }, { key: "curve-BR", tip: "Concave ↘" },
          ]},
          { label: "Convex",  items: [
            { key: "bump-TL", tip: "Convex ↖" }, { key: "bump-TR", tip: "Convex ↗" },
            { key: "bump-BL", tip: "Convex ↙" }, { key: "bump-BR", tip: "Convex ↘" },
          ]},
        ];

        const hasVariants = !!VARIANT_MAP[selected];
        MOD_ROWS.forEach(({ label, items }) => {
          const rowEl = document.createElement("div");
          rowEl.className = "mod-row";
          const lbl = document.createElement("span");
          lbl.className = "mod-row-label";
          lbl.textContent = label;
          rowEl.appendChild(lbl);
          items.forEach(({ key, tip }) => {
            const btn = document.createElement("div");
            btn.className = "mod-btn"
              + (key === modifier ? " active" : "")
              + (!hasVariants ? " mod-disabled" : "");
            btn.dataset.mod = key;
            btn.title = tip;
            const sw = document.createElement("canvas");
            sw.width = sw.height = 26;
            drawModPreview(sw.getContext("2d"), key, getModColor());
            btn.appendChild(sw);
            btn.addEventListener("click", () => {
              if (btn.classList.contains("mod-disabled")) return;
              modifier = key;
              document.querySelectorAll(".mod-btn").forEach(b => b.classList.remove("active"));
              btn.classList.add("active");
            });
            rowEl.appendChild(btn);
          });
          strip.appendChild(rowEl);
        });
        paletteEl.appendChild(strip);

        // ── Columns (base tiles only) ──
        const colsEl = document.createElement("div");
        colsEl.className = "pal-cols";

        const baseTiles = TILES.filter(t => t.sg === "" || t.sg === "full");
        const byGroup = {};
        baseTiles.forEach(t => (byGroup[t.g] = byGroup[t.g] || []).push(t));

        function makeGroup(gname) {
          const tiles = byGroup[gname];
          if (!tiles || !tiles.length) return null;
          const grp = document.createElement("div");
          grp.className = "pg";
          const title = document.createElement("div");
          title.className = "pg-title";
          title.textContent = gname;
          grp.appendChild(title);
          const row = document.createElement("div");
          row.className = "tile-row";
          tiles.forEach(t => {
            const btn = document.createElement("div");
            btn.className = "swatch-btn" + (t.c === selected ? " active" : "");
            btn.dataset.char = t.c;
            btn.title = t.l;
            const sw = document.createElement("canvas");
            sw.width = sw.height = SW;
            const sc = sw.getContext("2d");
            sc.save();
            sc.scale(SW / T, SW / T);
            t.d(sc, 0, 0);
            sc.restore();
            btn.appendChild(sw);
            btn.addEventListener("click", () => {
              selected = t.c;
              document.querySelectorAll(".swatch-btn").forEach(b => b.classList.remove("active"));
              btn.classList.add("active");
              updateModifierStrip();
              if (selMode) { selMode = false; btnSelect.classList.remove("active-tool"); }
            });
            row.appendChild(btn);
          });
          grp.appendChild(row);
          return grp;
        }

        [
          { label: "Walls",   groups: COL_WALL },
          { label: "Ground",  groups: COL_GROUND },
          { label: "Objects", groups: COL_OBJECT },
        ].forEach(({ label, groups: colGroups }) => {
          const col = document.createElement("div");
          col.className = "pal-col";
          const colTitle = document.createElement("div");
          colTitle.className = "pal-col-title";
          colTitle.textContent = label;
          col.appendChild(colTitle);
          colGroups.forEach(gname => {
            const grp = makeGroup(gname);
            if (grp) col.appendChild(grp);
          });
          colsEl.appendChild(col);
        });

        paletteEl.appendChild(colsEl);
      }

      function updateModifierStrip() {
        const hasVariants = !!VARIANT_MAP[selected];
        const color = getModColor();
        document.querySelectorAll(".mod-btn").forEach(btn => {
          btn.classList.toggle("mod-disabled", !hasVariants);
          btn.classList.toggle("active", btn.dataset.mod === modifier);
          const cv = btn.querySelector("canvas");
          if (cv) drawModPreview(cv.getContext("2d"), btn.dataset.mod, color);
        });
      }

      // ── Toolbar ───────────────────────────────────────────────────────────────────

      // Build 3×3 anchor grid
      {
        const anchorEl = document.getElementById("resize-anchor");
        for (let r = 0; r < 3; r++) {
          for (let c = 0; c < 3; c++) {
            const btn = document.createElement("button");
            btn.dataset.r = r; btn.dataset.c = c;
            if (r === 0 && c === 0) btn.classList.add("active");
            btn.addEventListener("click", () => {
              resizeAnchorR = r; resizeAnchorC = c;
              anchorEl.querySelectorAll("button").forEach(b => b.classList.remove("active"));
              btn.classList.add("active");
            });
            anchorEl.appendChild(btn);
          }
        }
      }

      document.getElementById("btn-resize").addEventListener("click", () => {
        const w = Math.max(
          5,
          parseInt(document.getElementById("iw").value) || mapW,
        );
        const h = Math.max(
          5,
          parseInt(document.getElementById("ih").value) || mapH,
        );
        const dr = Math.round(resizeAnchorR / 2 * (h - mapH));
        const dc = Math.round(resizeAnchorC / 2 * (w - mapW));
        snapshot();
        initGrid(w, h, true, dr, dc);
        resizeCanvas();
        render();
      });

      document.getElementById("btn-load").addEventListener("click", () => {
        document.getElementById("file-in").click();
      });

      document.getElementById("file-in").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const text = ev.target.result;
          const baseName = file.name.replace(/\.(txt|json)$/, "");
          snapshot();
          if (text.trim().startsWith("{")) {
            loadMapJSON(JSON.parse(text), baseName);
          } else {
            // Legacy text: auto-split into layers
            const rows = text
              .trimEnd()
              .split("\n")
              .map((r) => r.split(""));
            const h = rows.length;
            const w = Math.max(...rows.map((r) => r.length));
            rows.forEach((r) => {
              while (r.length < w) r.push(".");
            });
            loadMapJSON(
              {
                width: w,
                height: h,
                ground: rows.map((row) =>
                  row.map((ch) => (WALL_CHARS_SET.has(ch) ? "." : ch)).join(""),
                ),
                walls: rows.map((row) =>
                  row.map((ch) => (WALL_CHARS_SET.has(ch) ? ch : ".")).join(""),
                ),
              },
              baseName,
            );
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      });

      document
        .getElementById("btn-save")
        .addEventListener("click", async () => {
          const name = document.getElementById("iname").value.trim() || "map";
          const mapData = {
            width: mapW,
            height: mapH,
            ground: groundGrid.map((r) => r.join("")),
            walls: wallGrid.map((r) => r.join("")),
          };
          if (groundLayersGrid.length > 0) {
            mapData.groundLayers = groundLayersGrid.map(layer => layer.map(r => r.join("")));
          }
          const content = JSON.stringify(mapData, null, 2);
          const statusEl = document.getElementById("status");
          statusEl.textContent = "Saving…";
          try {
            const png = await generateThumbnail();
            const resp = await fetch("/editor/save", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name, content, png }),
            });
            const data = await resp.json();
            statusEl.textContent = data.ok
              ? `✓ Saved ${data.file}`
              : "✗ " + (data.error || "Save failed");
            if (data.ok && png) {
              document.querySelectorAll(`#map-grid img[src^="/maps/${name}.png"]`).forEach(el => {
                el.src = `/maps/${name}.png?t=${Date.now()}`;
              });
            }
          } catch {
            statusEl.textContent = "✗ Save failed (not localhost?)";
          }
          setTimeout(() => {
            statusEl.textContent = "";
          }, 2500);
        });

      // Select tool button
      const btnSelect = document.getElementById("btn-select");
      btnSelect.addEventListener("click", () => {
        selMode = !selMode;
        if (!selMode) {
          cancelSel();
          render();
        }
        btnSelect.classList.toggle("active-tool", selMode);
      });

      // Keyboard: Escape cancels selection; tile chars select tile in paint mode
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          cancelSel();
          render();
          return;
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "z") {
          if (e.target.tagName !== "INPUT") { e.preventDefault(); undo(); }
          return;
        }
        if (e.target.tagName === "INPUT") return;
        // Select-mode shortcuts
        if (
          selMode &&
          (e.key === "Delete" || e.key === "Backspace") &&
          selPhase === "selected"
        ) {
          clearSel();
          render();
          e.preventDefault();
          return;
        }
        if (selMode && e.ctrlKey && e.key === "c" && selPhase === "selected") {
          clipboard = selBuf.map((row) => row.map((cell) => ({ ...cell })));
          cancelSel();
          render();
          e.preventDefault();
          return;
        }
        if (e.ctrlKey && e.key === "v" && clipboard) {
          snapshot();
          pasteSel();
          e.preventDefault();
          return;
        }
        if (selMode) return;
        const tile = TILE_BY_CHAR[e.key];
        if (!tile) return;
        selected = e.key;
        document
          .querySelectorAll(".swatch-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.char === e.key),
          );
        updateModifierStrip();
      });

      // ── Map browser helpers ───────────────────────────────────────────────────────

      function loadMapJSON(data, name) {
        mapW = data.width;
        mapH = data.height;
        groundGrid = data.ground.map((r) => {
          const a = r.split("");
          while (a.length < mapW) a.push(".");
          return a;
        });
        wallGrid = data.walls.map((r) => {
          const a = r.split("");
          while (a.length < mapW) a.push(".");
          return a;
        });
        groundLayersGrid = (data.groundLayers || []).map(layer =>
          layer.map(r => {
            const a = r.split("");
            while (a.length < mapW) a.push(".");
            return a;
          })
        );
        document.getElementById("iw").value = mapW;
        document.getElementById("ih").value = mapH;
        if (name !== undefined) document.getElementById("iname").value = name;
        resizeCanvas();
        render();
      }

      async function generateThumbnail() {
        const THUMB_W = 300;
        const scale = THUMB_W / (mapW * T);
        const tw = Math.round(mapW * T * scale);
        const th = Math.round(mapH * T * scale);
        const off = new OffscreenCanvas(tw, th);
        const oc = off.getContext("2d");
        oc.scale(scale, scale);
        for (let r = 0; r < mapH; r++) {
          for (let c = 0; c < mapW; c++) {
            const x = c * T,
              y = r * T;
            const gTile = TILE_BY_CHAR[groundGrid[r][c]] || TILE_BY_CHAR["."];
            const wCh = wallGrid[r][c];
            const wTile = wCh !== "." ? TILE_BY_CHAR[wCh] || null : null;
            gTile.d(oc, x, y);
            for (const layer of groundLayersGrid) {
              const lCh = layer[r][c];
              if (lCh && lCh !== ".") drawTileShapeOnly(oc, x, y, lCh);
            }
            if (wTile) wTile.d(oc, x, y);
          }
        }
        const blob = await off.convertToBlob({ type: "image/png" });
        return new Promise((res) => {
          const fr = new FileReader();
          fr.onload = (e) => res(e.target.result);
          fr.readAsDataURL(blob);
        });
      }

      async function openMapBrowser() {
        const modal = document.getElementById("map-browser");
        modal.removeAttribute("hidden");
        const grid = document.getElementById("map-grid");
        grid.innerHTML = '<div style="color:#666;padding:20px">Loading…</div>';
        let maps;
        try {
          maps = await fetch("/api/maps").then((r) => r.json());
        } catch {
          grid.innerHTML =
            '<div style="color:#c55;padding:20px">Failed to load map list.</div>';
          return;
        }
        grid.innerHTML = "";
        if (maps.length === 0) {
          grid.innerHTML =
            '<div style="color:#666;padding:20px">No maps saved yet.</div>';
          return;
        }
        for (const name of maps) {
          const card = document.createElement("div");
          card.className = "map-card";
          const thumb = document.createElement("div");
          thumb.className = "map-card-thumb";
          const img = document.createElement("img");
          img.src = `/maps/${name}.png?t=${Date.now()}`;
          const placeholder = document.createElement("div");
          placeholder.className = "map-card-placeholder";
          placeholder.textContent = "🗺";
          img.onerror = () => img.replaceWith(placeholder);
          const label = document.createElement("div");
          label.className = "map-card-name";
          label.textContent = name;
          thumb.append(img, label);
          card.append(thumb);
          card.addEventListener("click", async () => {
            try {
              const data = await fetch(`/maps/${name}.json`).then((r) =>
                r.json(),
              );
              snapshot();
              loadMapJSON(data, name);
              modal.setAttribute("hidden", "");
            } catch {
              alert(`Failed to load map "${name}"`);
            }
          });
          grid.appendChild(card);
        }
      }

      document
        .getElementById("btn-browse")
        .addEventListener("click", openMapBrowser);
      document
        .getElementById("btn-browser-close")
        .addEventListener("click", () => {
          document.getElementById("map-browser").setAttribute("hidden", "");
        });
      document.getElementById("map-browser").addEventListener("click", (e) => {
        if (e.target === e.currentTarget)
          e.currentTarget.setAttribute("hidden", "");
      });

      // ── Init ──────────────────────────────────────────────────────────────────────

      initGrid(mapW, mapH, false);
      // Default start + hole in ground layer
      groundGrid[Math.floor(mapH / 2)][2] = "S";
      groundGrid[Math.floor(mapH / 2)][mapW - 3] = "O";
      buildPalette();
      resizeCanvas();
      render();

      // Auto-load _test map on startup
      fetch("/maps/_test.json")
        .then((r) => (r.ok ? r.json() : null))
        .then((data) => {
          if (data) loadMapJSON(data, "_test");
        })
        .catch(() => {});
    </script>
  </body>
</html>
