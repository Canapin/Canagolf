<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canagolf</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="setup">
      <img src="banner.png" id="banner" alt="Canagolf" />
      <p class="subtitle">Mini golf · physics-based · multiplayer</p>

      <div class="tabs">
        <button class="tab active" data-tab="local">Local</button>
        <button class="tab" data-tab="online">Online</button>
      </div>

      <div id="tab-local">
        <div class="map-row">
          <label for="map-select-local">Map</label>
          <select id="map-select-local"></select>
        </div>
        <div class="map-row" id="rounds-row" hidden>
          <label for="rounds-input">Rounds</label>
          <input
            type="number"
            id="rounds-input"
            value="10"
            min="1"
            max="99"
            style="width: 60px"
          />
        </div>
        <div id="player-list"></div>
        <div class="setup-actions">
          <button id="add-player">+ Add Player</button>
          <button id="start-game" class="btn-primary">Start Game ▶</button>
        </div>
      </div>

      <div id="tab-online" hidden>
        <input
          type="text"
          id="online-name"
          placeholder="Your name"
          maxlength="20"
          class="wide-input"
        />
        <div class="setup-actions">
          <button id="btn-create" class="btn-primary">Create Room</button>
        </div>
        <div class="join-row">
          <input type="text" id="join-code" placeholder="ABCD" maxlength="4" />
          <button id="btn-join">Join Room</button>
        </div>
        <p id="online-error" class="error-msg"></p>
      </div>
    </div>

    <div id="lobby" hidden>
      <div class="lobby-card">
        <h2 class="lobby-title">Room <span id="lobby-code">----</span></h2>
        <p class="lobby-hint">Share this code with friends</p>
        <ul id="lobby-players"></ul>
        <div id="lobby-map-row" hidden>
          <label for="map-select-lobby">Map</label>
          <select id="map-select-lobby"></select>
        </div>
        <div id="lobby-rounds-row" hidden>
          <label for="rounds-input-lobby">Rounds</label>
          <input type="number" id="rounds-input-lobby" value="10" min="1" max="99" style="width:60px" />
        </div>
        <button id="lobby-start" class="btn-primary" hidden>
          Start Game ▶
        </button>
        <p id="lobby-waiting" class="lobby-hint">Waiting for host to start…</p>
      </div>
    </div>

    <div id="scoreboard" hidden>
      <div class="scoreboard-card">
        <h2 id="scoreboard-title" class="scoreboard-title">Hole Complete!</h2>
        <ol id="scoreboard-list"></ol>
        <button id="scoreboard-close" class="btn-primary">Play Again</button>
        <p id="scoreboard-waiting" hidden class="lobby-hint">
          Waiting for host to close…
        </p>
      </div>
    </div>

    <div id="game-ui" hidden>
      <div id="hud"></div>
      <canvas id="canvas"></canvas>
      <p class="hint">
        Click anywhere to aim &amp; shoot · power = distance from ball
      </p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
